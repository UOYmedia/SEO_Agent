// ── KB Stats ──────────────────────────────────────────────────
async function kbLoadStats() {
  const shop = S.currentShop || ''
  const sp = shop ? `?shop_domain=${encodeURIComponent(shop)}` : ''
  try {
    const s = await GET(`/api/v1/knowledge/stats${sp}`)
    document.getElementById('kb-stats-bar').innerHTML = `
      <div class="card text-center py-3"><div class="text-2xl font-bold text-indigo-600">${s.total}</div><div class="text-xs text-gray-400 mt-1">Total Items</div></div>
      <div class="card text-center py-3"><div class="text-2xl font-bold text-green-600">${s.approved}</div><div class="text-xs text-gray-400 mt-1">Approved</div></div>
      <div class="card text-center py-3"><div class="text-2xl font-bold text-yellow-500">${s.pending}</div><div class="text-xs text-gray-400 mt-1">Pending Review</div></div>
      <div class="card text-center py-3"><div class="text-2xl font-bold text-gray-500">${s.rejected}</div><div class="text-xs text-gray-400 mt-1">Rejected</div></div>`
  } catch(e) {
    document.getElementById('kb-stats-bar').innerHTML = `<div class="text-xs text-red-500">${esc(e.message)}</div>`
  }
}

// ── KB Items ──────────────────────────────────────────────────
let _kbPage = 1
async function kbLoadItems(page = 1) {
  _kbPage = page
  const shop = S.currentShop || ''
  const q = document.getElementById('kb-search')?.value?.trim() || ''
  const status = document.getElementById('kb-filter-status')?.value || ''
  const type = document.getElementById('kb-filter-type')?.value || ''
  const params = new URLSearchParams({ page, limit: 20 })
  if (shop) params.set('shop_domain', shop)
  if (q) params.set('q', q)
  if (status) params.set('status', status)
  if (type) params.set('source_type', type)

  const el = document.getElementById('kb-items-list')
  if (!el) return
  el.innerHTML = skeletons(3)
  try {
    const data = await GET(`/api/v1/knowledge/items?${params}`)
    if (!data.items.length) {
      el.innerHTML = `<div class="text-sm text-gray-400 text-center py-6">No items found.</div>`
      document.getElementById('kb-items-pagination').innerHTML = ''
      return
    }
    const statusBadgeKb = s => ({
      pending:  '<span class="badge badge-yellow">Pending</span>',
      approved: '<span class="badge badge-green">Approved</span>',
      rejected: '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Rejected</span>',
    }[s] || s)
    const typeIcon = t => ({ blog:'📄', product:'🛒', trend:'📊', analysis:'📈', feedback:'💬', manual:'✏️' }[t] || '📎')
    el.innerHTML = `<table class="w-full text-sm">
      <thead><tr class="text-left text-xs text-gray-400 border-b">
        <th class="pb-2 font-medium">Title</th>
        <th class="pb-2 font-medium">Type</th>
        <th class="pb-2 font-medium">Words</th>
        <th class="pb-2 font-medium">Status</th>
        <th class="pb-2 font-medium">Actions</th>
      </tr></thead>
      <tbody>
        ${data.items.map(i => `<tr class="border-b border-gray-50 table-row">
          <td class="py-2 pr-3 max-w-xs truncate" title="${esc(i.title||'')}">
            ${typeIcon(i.source_type)} ${esc(i.title||'(untitled)')}
            ${i.source_url ? `<a href="${esc(i.source_url)}" target="_blank" class="text-indigo-400 ml-1 text-xs">↗</a>` : ''}
          </td>
          <td class="py-2 pr-3 text-gray-400">${esc(i.source_type)}</td>
          <td class="py-2 pr-3 text-gray-400">${i.word_count||0}</td>
          <td class="py-2 pr-3">${statusBadgeKb(i.status)}</td>
          <td class="py-2">
            <div class="flex gap-1 action-btns opacity-0">
              ${i.status !== 'approved' ? `<button class="btn btn-sm" style="background:#dcfce7;color:#166534;font-size:11px;padding:2px 8px" onclick="kbSetStatus(${i.id},'approved')">✅</button>` : ''}
              ${i.status !== 'rejected' ? `<button class="btn btn-sm" style="background:#fee2e2;color:#991b1b;font-size:11px;padding:2px 8px" onclick="kbSetStatus(${i.id},'rejected')">❌</button>` : ''}
              ${i.status !== 'pending'  ? `<button class="btn btn-sm" style="background:#f3f4f6;color:#374151;font-size:11px;padding:2px 8px" onclick="kbSetStatus(${i.id},'pending')">🕐</button>` : ''}
              <button class="btn btn-sm" style="background:#f3f4f6;color:#374151;font-size:11px;padding:2px 8px" onclick="kbViewItem(${i.id})">View</button>
              <button class="btn btn-sm" style="background:#fee2e2;color:#991b1b;font-size:11px;padding:2px 8px" onclick="kbDeleteItem(${i.id})">🗑</button>
            </div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`

    // Pagination
    const totalPages = Math.ceil(data.total / 20)
    const pg = document.getElementById('kb-items-pagination')
    pg.innerHTML = totalPages > 1
      ? Array.from({length: totalPages}, (_,i) => `<button class="btn btn-sm ${i+1===page?'btn-primary':'btn-secondary'}" onclick="kbLoadItems(${i+1})">${i+1}</button>`).join('')
      : ''
  } catch(e) {
    el.innerHTML = `<div class="text-red-500 text-xs">Error: ${esc(e.message)}</div>`
  }
}

async function kbSetStatus(id, status) {
  try {
    await PUT(`/api/v1/knowledge/items/${id}/status`, { status })
    kbLoadItems(_kbPage)
    kbLoadStats()
  } catch(e) { toast(e.message, 'error') }
}

async function kbDeleteItem(id) {
  if (!confirm('Delete this knowledge item?')) return
  try {
    await DEL(`/api/v1/knowledge/items/${id}`)
    toast('Deleted', 'success')
    kbLoadItems(_kbPage)
    kbLoadStats()
  } catch(e) { toast(e.message, 'error') }
}

async function kbViewItem(id) {
  try {
    const item = await GET(`/api/v1/knowledge/items/${id}`)
    openModal(item.title || 'Knowledge Item', `
      <div class="text-xs text-gray-400 mb-2">${esc(item.source_type)} · ${item.status}${item.source_url ? ` · <a href="${esc(item.source_url)}" target="_blank" class="text-indigo-400">source ↗</a>` : ''}</div>
      <div class="border rounded-lg p-3 bg-gray-50 overflow-auto" style="max-height:400px;font-size:12px;white-space:pre-wrap;font-family:monospace">${esc(item.content_md||'(no content)')}</div>`,
      `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Close</button>`)
  } catch(e) { toast(e.message, 'error') }
}

async function kbApproveAll() {
  const shop = S.currentShop || ''
  const sp = shop ? `?shop_domain=${encodeURIComponent(shop)}` : ''
  try {
    const r = await PUT(`/api/v1/knowledge/items/approve-all${sp}`)
    toast(`✅ ${r.approved} items approved`, 'success')
    kbLoadItems(1)
    kbLoadStats()
  } catch(e) { toast(e.message, 'error') }
}

// ── Store list ─────────────────────────────────────────────────
async function kbLoadStores() {
  const el = document.getElementById('kb-store-list')
  if (!el) return

  const stores = S.myStores || []
  if (!stores.length) {
    el.innerHTML = `<div class="text-xs text-gray-400">No active stores found. Connect a Shopify store first.</div>`
    return
  }

  // Build store rows — each shows last crawl job status if any
  const shop = S.currentShop || ''
  let jobs = []
  try {
    const sp = shop ? `?shop_domain=${encodeURIComponent(shop)}` : ''
    const allJobs = await GET(`/api/v1/knowledge/jobs${sp}`)
    jobs = allJobs.filter(j => j.job_type === 'shopify_store')
  } catch(_) {}

  el.innerHTML = stores.map(s => {
    const lastJob = jobs.find(j => j.shop_domain === s.shop_domain)
    const jobBadge = lastJob
      ? ({ queued: '🕐 Queued', running: '⏳ Crawling…', done: `✅ ${lastJob.items_found} articles`, failed: '❌ Failed' }[lastJob.status] || lastJob.status)
      : ''
    return `<div class="flex items-center gap-2 p-2 border border-gray-100 rounded-lg">
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium text-gray-700 truncate">${esc(s.shop_domain)}</div>
        ${jobBadge ? `<div class="text-xs text-gray-400 mt-0.5">${jobBadge}${lastJob?.error ? ` · <span class="text-red-400" title="${esc(lastJob.error)}">⚠ error</span>` : ''}</div>` : ''}
      </div>
      <button class="btn btn-primary btn-sm shrink-0" id="kb-store-btn-${esc(s.shop_domain)}"
        onclick="kbCrawlStore('${esc(s.shop_domain)}')">
        🌐 Import Blog
      </button>
    </div>`
  }).join('')
}

async function kbCrawlStore(shopDomain) {
  const btn = document.getElementById(`kb-store-btn-${shopDomain}`)
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ Starting…' }
  const status = document.getElementById('kb-crawl-status')
  try {
    const r = await POST('/api/v1/knowledge/crawl-store', { shop_domain: shopDomain })
    if (status) status.textContent = `✅ Job #${r.job_id} started for ${shopDomain} — articles will appear in KB shortly.`
    // Poll for completion: refresh job list + stats after a few seconds
    setTimeout(() => { kbLoadJobs(); kbLoadStores() }, 4000)
    setTimeout(() => { kbLoadJobs(); kbLoadItems(); kbLoadStats(); kbLoadStores() }, 15000)
  } catch(e) {
    if (status) status.textContent = `Error: ${e.message}`
    toast(e.message, 'error')
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '🌐 Import Blog' }
  }
}

// ── Crawl ──────────────────────────────────────────────────────
async function kbCrawl() {
  const url = document.getElementById('kb-url')?.value?.trim()
  if (!url) { toast('Enter a URL', 'error'); return }
  const crawlIndex = document.getElementById('kb-index')?.checked || false
  const btn = document.getElementById('kb-crawl-btn')
  const status = document.getElementById('kb-crawl-status')
  btn.disabled = true; btn.textContent = 'Crawling…'
  status.textContent = 'Starting crawl…'
  try {
    const r = await POST('/api/v1/knowledge/crawl', {
      url, shop_domain: S.currentShop || null, crawl_index: crawlIndex
    })
    status.textContent = `✅ Job #${r.job_id} started. Check jobs below for progress.`
    document.getElementById('kb-url').value = ''
    setTimeout(kbLoadJobs, 2000)
    setTimeout(() => { kbLoadJobs(); kbLoadItems(); kbLoadStats() }, 8000)
  } catch(e) {
    status.textContent = 'Error: ' + e.message
  } finally {
    btn.disabled = false; btn.textContent = '🌐 Start Crawl'
  }
}

async function kbLoadJobs() {
  const shop = S.currentShop || ''
  const sp = shop ? `?shop_domain=${encodeURIComponent(shop)}` : ''
  const el = document.getElementById('kb-jobs')
  if (!el) return
  try {
    const jobs = await GET(`/api/v1/knowledge/jobs${sp}`)
    if (!jobs.length) { el.innerHTML = ''; return }
    const statusIcon = s => ({queued:'🕐',running:'⏳',done:'✅',failed:'❌'}[s]||s)
    el.innerHTML = `<div class="text-xs font-medium text-gray-500 mb-1">Recent crawl jobs:</div>` +
      jobs.slice(0,5).map(j => `<div class="flex items-center gap-2 py-1 border-b border-gray-50">
        <span>${statusIcon(j.status)}</span>
        <span class="truncate flex-1 text-gray-600" title="${esc(j.url)}">${esc(j.url.slice(0,60))}${j.url.length>60?'…':''}</span>
        <span class="text-gray-400">${j.items_found||0} items</span>
        ${j.error ? `<span class="text-red-400" title="${esc(j.error)}">⚠</span>` : ''}
      </div>`).join('')
  } catch(_) {}
}

// ── Trend Research ─────────────────────────────────────────────
async function kbTrend() {
  const kw = document.getElementById('kb-trend-kw')?.value?.trim()
  if (!kw) { toast('Enter a keyword', 'error'); return }
  const btn = document.getElementById('kb-trend-btn')
  const result = document.getElementById('kb-trend-result')
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Researching…'
  result.innerHTML = 'Analyzing market trends…'
  try {
    const r = await POST('/api/v1/knowledge/trend', {
      seed_keyword: kw, shop_domain: S.currentShop || null
    })
    const ins = r.insights
    result.innerHTML = `
      <div class="bg-indigo-50 rounded-lg p-3 space-y-2">
        <div class="font-medium text-indigo-800">${esc(ins.trend_summary||'')}</div>
        ${ins.new_keywords?.length ? `<div><span class="text-gray-500 text-xs">New keywords:</span> ${ins.new_keywords.map(k=>`<span class="badge badge-yellow ml-1">${esc(k)}</span>`).join('')}</div>` : ''}
        ${ins.content_gaps?.length ? `<div class="text-xs text-gray-600">Content gaps: ${ins.content_gaps.join(' · ')}</div>` : ''}
        ${ins.recommended_titles?.length ? `<div class="text-xs">
          <div class="text-gray-500 mb-1">Article ideas:</div>
          ${ins.recommended_titles.map(t=>`<div class="flex items-center gap-1">• <a class="text-indigo-500 cursor-pointer" onclick="prefillGenerateKw(${JSON.stringify(esc(kw))},${JSON.stringify(esc(t))})">${esc(t)}</a></div>`).join('')}
        </div>` : ''}
        <div class="text-xs text-yellow-700 mt-1">🕐 Saved to approval queue (item #${r.item_id}) — <a class="underline cursor-pointer" onclick="kbSetStatus(${r.item_id},'approved');this.parentElement.innerHTML='✅ Approved'">Approve now</a></div>
      </div>`
    kbLoadStats()
    kbLoadItems()
  } catch(e) {
    result.innerHTML = `<div class="text-red-500">Error: ${esc(e.message)}</div>`
  } finally {
    btn.disabled = false; btn.textContent = '🔍 Research Trend'
  }
}

// ── Ranking Analysis ───────────────────────────────────────────
async function kbAnalyzeRankings() {
  const btn = document.getElementById('kb-rank-btn')
  const result = document.getElementById('kb-rank-result')
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Fetching GSC data…'
  result.innerHTML = ''
  try {
    const shop = S.currentShop || ''
    const sp = shop ? `?shop_domain=${encodeURIComponent(shop)}&days=28` : '?days=28'
    const queries = await GET(`/api/v1/audit/gsc/queries${sp}&limit=30`)
    if (!queries.length) {
      result.innerHTML = '<div class="text-gray-400 text-xs">No GSC ranking data found. Connect GSC in Brand Profile first.</div>'
      return
    }
    result.innerHTML = `Analyzing ${queries.length} keywords with GPT-4o…`
    const r = await POST('/api/v1/knowledge/analyze-rankings', {
      rankings: queries.map(q => ({ keyword: q.query, position: q.position, clicks: q.clicks, impressions: q.impressions })),
      shop_domain: shop || null
    })
    const a = r.analysis
    result.innerHTML = `
      <div class="bg-green-50 rounded-lg p-3 space-y-2">
        <div class="font-medium text-green-800">${esc(a.performance_summary||'')}</div>
        ${a.writing_lessons?.length ? `<div class="text-xs"><div class="text-gray-500 mb-1">Writing lessons:</div>${a.writing_lessons.map(l=>`<div>• ${esc(l)}</div>`).join('')}</div>` : ''}
        ${a.improvement_priorities?.length ? `<div class="text-xs text-gray-600 mt-1"><b>Priorities:</b> ${a.improvement_priorities.join(' · ')}</div>` : ''}
        <div class="text-xs text-yellow-700 mt-1">🕐 Saved to approval queue (item #${r.item_id}) — <a class="underline cursor-pointer" onclick="kbSetStatus(${r.item_id},'approved');this.parentElement.innerHTML='✅ Approved'">Approve now</a></div>
      </div>`
    kbLoadStats()
    kbLoadItems()
  } catch(e) {
    result.innerHTML = `<div class="text-red-500">Error: ${esc(e.message)}</div>`
  } finally {
    btn.disabled = false; btn.textContent = '📈 Analyze Rankings from GSC'
  }
}

          <li>Tone of Voice overrides the per-article tone selector</li>
          <li>Output Requirements give GPT-4o structural and formatting rules</li>
          <li>GSC connection scopes Search Console data to this brand's site</li>
        </ul>
      </div>
    </div>`
}

async function saveBrand() {
  const shop = S.currentShop
  const body = {
    shop_domain: shop || null,
    brand_name: document.getElementById('bp-name').value.trim(),
    brand_description: document.getElementById('bp-desc').value.trim(),
    brand_style: document.getElementById('bp-style').value.trim(),
    tone_of_voice: document.getElementById('bp-tone').value.trim(),
    output_requirements: document.getElementById('bp-output').value.trim(),
    gsc_site_url: document.getElementById('bp-gsc-url')?.value.trim() || null,
  }
  try {
    S.brandProfile = await PUT('/api/v1/settings/brand', body)
    toast('Brand profile saved!', 'success')
  } catch(e) { toast('Save failed: ' + e.message, 'error') }
}

async function gscConnect() {
  const shop = S.currentShop
  // Save GSC site URL first
  const siteUrl = document.getElementById('bp-gsc-url')?.value.trim()
  if (siteUrl) await saveBrand()
  try {
    const r = await GET(`/api/v1/settings/gsc/connect${shop ? '?shop_domain='+encodeURIComponent(shop) : ''}`)
    window.open(r.auth_url, '_blank', 'width=600,height=700')
    toast('Complete Google sign-in in the new window, then refresh this page', 'info')
  } catch(e) { toast('Connect failed: ' + e.message, 'error') }
}

async function browseGscSites() {
  const shop = S.currentShop
  const el = document.getElementById('gsc-sites-list')
  if (!el) return
  el.innerHTML = '<div class="text-xs text-gray-400 py-1">Loading…</div>'
  try {
    const sites = await GET(`/api/v1/audit/gsc/sites${shop ? '?shop_domain='+encodeURIComponent(shop) : ''}`)
    if (!sites.length) { el.innerHTML = '<div class="text-xs text-amber-600">No properties found for this account</div>'; return }
    el.innerHTML = `<div class="text-xs text-gray-500 mb-1">Click to select:</div>` +
      sites.map(s => `
        <button onclick="document.getElementById('bp-gsc-url').value='${esc(s.site_url)}';document.getElementById('gsc-sites-list').innerHTML=''"
          class="block w-full text-left text-xs px-2 py-1.5 rounded hover:bg-indigo-50 hover:text-indigo-700 font-mono truncate">
          ${esc(s.site_url)} <span class="text-gray-400 font-sans">(${esc(s.permission)})</span>
        </button>`).join('')
  } catch(e) { el.innerHTML = `<div class="text-xs text-red-500">${esc(e.message)}</div>` }
}

async function gscDisconnect() {
  const shop = S.currentShop
  if (!confirm('Disconnect Google Search Console for this brand?')) return
  try {
    await api('DELETE', `/api/v1/settings/gsc/disconnect${shop ? '?shop_domain='+encodeURIComponent(shop) : ''}`)
    S.brandProfile = null
    renderBrand()
    toast('GSC disconnected', 'success')
  } catch(e) { toast('Disconnect failed: ' + e.message, 'error') }
}

// ══════════════════════ USER MANAGEMENT ══════════════════════
async function renderUsers() {
  if (!S.user || S.user.role !== 'admin') {
    document.getElementById('content').innerHTML = '<div class="card text-center text-gray-400 py-10">Admin access required</div>'
    return
  }
  document.getElementById('header-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="openCreateUserModal()">+ New User</button>`

  document.getElementById('content').innerHTML = `
    <div class="space-y-4">
      <div class="card" id="users-table"><div class="flex justify-center py-8"><div class="spinner-dark"></div></div></div>
    </div>`

  loadUsersTable()
}

async function loadUsersTable() {
  try {
    const users = await GET('/api/v1/users/')
    const el = document.getElementById('users-table')
    if (!el) return

    const scopeBadge = s => {
      const colors = { read:'badge-blue', write:'badge-yellow', publish:'badge-green', audit:'badge-purple' }
      return `<span class="badge ${colors[s]||'badge-gray'} mr-1">${s}</span>`
    }

    el.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-gray-800">Users (${users.length})</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase">
            <th class="text-left py-2 pr-4">User</th>
            <th class="text-center py-2 px-3">Role</th>
            <th class="text-left py-2 px-3">Store Access</th>
            <th class="text-center py-2 px-3">Status</th>
            <th class="py-2 px-3"></th>
          </tr></thead>
          <tbody>
            ${users.map(u => `
              <tr class="border-b border-gray-50 table-row" id="user-row-${u.id}">
                <td class="py-3 pr-4">
                  <div class="font-medium text-gray-800">${esc(u.name)}</div>
                  <div class="text-xs text-gray-400">${esc(u.email)}</div>
                </td>
                <td class="text-center py-3 px-3">
                  <span class="badge ${u.role==='admin'?'badge-purple':'badge-blue'}">${u.role==='admin'?'👑 Admin':'👤 Member'}</span>
                </td>
                <td class="py-3 px-3">
                  ${u.store_permissions && u.store_permissions.length
                    ? u.store_permissions.map(p => `
                        <div class="mb-1">
                          <span class="text-xs font-medium text-gray-600">${esc(p.shop_domain)}</span>
                          <span class="ml-1">${(p.scopes||[]).map(scopeBadge).join('')}</span>
                        </div>`).join('')
                    : '<span class="text-xs text-gray-400">' + (u.role==='admin' ? 'All stores' : 'No stores assigned') + '</span>'
                  }
                </td>
                <td class="text-center py-3 px-3">
                  <span class="badge ${u.is_active?'badge-green':'badge-gray'}">${u.is_active?'Active':'Disabled'}</span>
                </td>
                <td class="py-3 px-3">
                  <div class="flex gap-1 action-btns flex-wrap">
                    <button class="btn btn-secondary btn-sm" onclick="openPermModal(${u.id},'${esc(u.name)}',${JSON.stringify(u.store_permissions||[])})">🔑 Permissions</button>
                    <button class="btn btn-secondary btn-sm" onclick="toggleUserActive(${u.id},${!u.is_active})">${u.is_active?'Disable':'Enable'}</button>
                    ${u.role !== 'admin' ? `<button class="btn btn-sm" style="${u.can_access_kb?'background:#dcfce7;color:#166534':'background:#f3f4f6;color:#374151'}" title="${u.can_access_kb?'Revoke KB access':'Grant KB access'}" onclick="toggleKbAccess(${u.id})">${u.can_access_kb?'🧠 KB ✓':'🧠 KB'}</button>` : ''}
                    ${u.id !== S.user?.id ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id},'${esc(u.name)}')">×</button>` : ''}
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`
  } catch(e) { toast('Failed to load users: ' + e.message, 'error') }
}

function openCreateUserModal() {
  const stores = S.myStores.map(s => s.shop_domain)
  openModal('Create New User', `
    <div class="space-y-3">
      <div><label>Name</label><input type="text" id="nu-name" placeholder="Full name"></div>
      <div><label>Email</label><input type="email" id="nu-email" placeholder="user@example.com"></div>
      <div><label>Password</label><input type="password" id="nu-pass" placeholder="Min 6 characters"></div>
      <div><label>Role</label>
        <select id="nu-role">
          <option value="member">👤 Member</option>
          <option value="admin">👑 Admin</option>
        </select>
      </div>
    </div>`,
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary btn-sm" onclick="doCreateUser()">Create User</button>`)
}

async function doCreateUser() {
  const name  = document.getElementById('nu-name')?.value?.trim()
  const email = document.getElementById('nu-email')?.value?.trim()
  const pass  = document.getElementById('nu-pass')?.value
  const role  = document.getElementById('nu-role')?.value
  if (!name || !email || !pass) { toast('Fill all fields', 'error'); return }
  try {
    await POST('/api/v1/users/', { name, email, password: pass, role })
    toast('User created', 'success')
    closeModal()
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

function openPermModal(userId, userName, currentPerms) {
  const stores = S.myStores.map(s => s.shop_domain)
  const scopeOpts = ['read', 'write', 'publish', 'audit']
  const existingByShop = {}
  currentPerms.forEach(p => { existingByShop[p.shop_domain] = p.scopes || [] })

  openModal(`Permissions — ${userName}`, `
    <div class="space-y-4">
      <p class="text-sm text-gray-500">Assign which stores and capabilities this user can access.</p>
      <div>
        <label>Store</label>
        <select id="perm-shop" class="mb-3" onchange="updatePermScopes(this.value,${JSON.stringify(existingByShop).replace(/"/g,'&quot;')})">
          ${stores.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('')}
          ${!stores.length ? '<option value="">No stores connected yet</option>' : ''}
        </select>
        <label>Capabilities</label>
        <div id="perm-scopes" class="flex flex-wrap gap-2 mt-1">
          ${scopeOpts.map(sc => `
            <label class="flex items-center gap-1.5 cursor-pointer text-sm">
              <input type="checkbox" value="${sc}" class="perm-cb rounded" ${(existingByShop[stores[0]]||[]).includes(sc)?'checked':''}>
              ${sc}
            </label>`).join('')}
        </div>
        <div class="text-xs text-gray-400 mt-2 space-y-0.5">
          <div><strong>read</strong> — view posts, audit results</div>
          <div><strong>audit</strong> — run audits, keyword research</div>
          <div><strong>write</strong> — generate articles</div>
          <div><strong>publish</strong> — publish to Shopify</div>
        </div>
      </div>
      <div id="current-perms">
        <div class="text-xs font-medium text-gray-500 mb-1">Current permissions:</div>
        ${currentPerms.length
          ? currentPerms.map(p => `
              <div class="flex items-center justify-between text-xs bg-gray-50 rounded-lg px-3 py-1.5 mb-1">
                <span>${esc(p.shop_domain)} — ${(p.scopes||[]).join(', ')}</span>
                <button onclick="revokePermInModal(${userId},'${esc(p.shop_domain)}')" class="text-red-400 hover:text-red-600 ml-2">×</button>
              </div>`).join('')
          : '<div class="text-xs text-gray-400">None yet</div>'
        }
      </div>
    </div>`,
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Close</button>
     <button class="btn btn-primary btn-sm" onclick="doGrantPerm(${userId})">Grant Access</button>`)
}

function updatePermScopes(shop, existingByShop) {
  const scopes = existingByShop[shop] || []
  document.querySelectorAll('.perm-cb').forEach(cb => {
    cb.checked = scopes.includes(cb.value)
  })
}

async function doGrantPerm(userId) {
  const shop = document.getElementById('perm-shop')?.value
  const scopes = [...document.querySelectorAll('.perm-cb:checked')].map(cb => cb.value)
  if (!shop) { toast('Select a store', 'error'); return }
  if (!scopes.length) { toast('Select at least one scope', 'error'); return }
  try {
    await POST(`/api/v1/users/${userId}/permissions`, { shop_domain: shop, scopes })
    toast('Permission granted', 'success')
    closeModal()
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

async function revokePermInModal(userId, shop) {
  if (!confirm(`Revoke access to ${shop}?`)) return
  try {
    await api('DELETE', `/api/v1/users/${userId}/permissions/${encodeURIComponent(shop)}`)
    toast('Access revoked', 'success')
    closeModal()
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

async function toggleUserActive(userId, active) {
  try {
    await api('PUT', `/api/v1/users/${userId}`, { is_active: active })
    toast(active ? 'User enabled' : 'User disabled', 'success')
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

async function deleteUser(userId, name) {
  if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return
  try {
    await api('DELETE', `/api/v1/users/${userId}`)
    toast('User deleted', 'success')
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

async function toggleKbAccess(userId) {
  try {
    const r = await api('PATCH', `/api/v1/users/${userId}/kb-access`)
    toast(r.can_access_kb ? '🧠 KB access granted' : 'KB access revoked', 'success')
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

// ══════════════════════ KEYWORD SUGGESTIONS ════════════════════
async function loadStoreSuggestions() {
  if (!S.currentShop) { toast('Select a store first', 'error'); return }
  const btn = document.getElementById('suggest-btn')
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Analysing…' }
  try {
    const data = await GET(`/api/v1/users/stores/${encodeURIComponent(S.currentShop)}/suggestions`)
    renderSuggestions(data)
  } catch(e) { toast('Suggestions failed: ' + e.message, 'error') }
  finally { if (btn) { btn.disabled = false; btn.innerHTML = '✨ Get Suggestions' } }
}

function renderSuggestions(data) {
  const el = document.getElementById('suggestions-results')
  if (!el) return

  const diffBadge = d => d==='low'?'badge-green':d==='medium'?'badge-yellow':'badge-red'
  const intentBadge = i => i==='commercial'?'badge-purple':i==='informational'?'badge-blue':'badge-gray'

  el.innerHTML = `
    <div class="space-y-4 mt-4">
      ${data.store_niche ? `<div class="bg-indigo-50 rounded-xl p-3 text-sm text-indigo-800"><strong>Store niche:</strong> ${esc(data.store_niche)}</div>` : ''}

      ${data.priority_keywords?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">🎯 Priority Keywords</h3>
          <div class="grid grid-cols-2 gap-2">
            ${data.priority_keywords.map(k => `
              <div class="border border-gray-100 rounded-xl p-3 bg-white">
                <div class="flex items-center justify-between mb-1">
                  <span class="font-medium text-gray-800 text-sm">${esc(k.keyword)}</span>
                  <span class="badge ${diffBadge(k.difficulty)}">${k.difficulty}</span>
                </div>
                <div class="flex gap-1 mb-1">
                  <span class="badge ${intentBadge(k.intent)} text-xs">${k.intent}</span>
                </div>
                <div class="text-xs text-gray-500">${esc(k.reason)}</div>
                <div class="flex gap-1 mt-2">
                  <button class="btn btn-secondary btn-sm" onclick="prefillRankingCheck('${esc(k.keyword)}')">Check rank</button>
                  <button class="btn btn-primary btn-sm" onclick="prefillGenerateKw('${esc(k.keyword)}','')">Write</button>
                </div>
              </div>`).join('')}
          </div>
        </div>` : ''}

      ${data.long_tail?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">🔗 Long-Tail Keywords</h3>
          <div class="flex flex-wrap gap-2">
            ${data.long_tail.map(k => `
              <div class="bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm">
                <div class="font-medium text-gray-700">${esc(k.keyword)}</div>
                <div class="flex gap-1 mt-1">
                  <span class="badge ${diffBadge(k.difficulty)}">${k.difficulty}</span>
                  <button class="btn btn-secondary btn-sm" onclick="prefillRankingCheck('${esc(k.keyword)}')">→</button>
                </div>
              </div>`).join('')}
          </div>
        </div>` : ''}

      ${data.trending_topics?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">🔥 Trending Topics</h3>
          <div class="space-y-2">
            ${data.trending_topics.map(t => `
              <div class="border border-orange-100 bg-orange-50 rounded-xl p-3">
                <div class="font-medium text-gray-800 text-sm mb-0.5">${esc(t.topic)}</div>
                <div class="text-xs text-indigo-700 mb-1">📌 ${esc(t.suggested_title)}</div>
                <div class="text-xs text-gray-500 mb-2">${esc(t.reason)}</div>
                <button class="btn btn-primary btn-sm" onclick="prefillGenerateKw('${esc(t.topic)}','${esc(t.suggested_title)}')">✍️ Write this</button>
              </div>`).join('')}
          </div>
        </div>` : ''}

      ${data.content_gaps?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">⚡ Content Gaps</h3>
          <div class="space-y-1">
            ${data.content_gaps.map(g => `
              <div class="flex items-center justify-between bg-red-50 border border-red-100 rounded-xl px-3 py-2">
                <div>
                  <span class="font-medium text-sm text-gray-800">${esc(g.keyword)}</span>
                  <span class="text-xs text-gray-500 ml-2">${esc(g.reason)}</span>
                </div>
                <button class="btn btn-primary btn-sm" onclick="prefillGenerateKw('${esc(g.keyword)}','')">Fill gap →</button>
              </div>`).join('')}
          </div>
        </div>` : ''}
    </div>`
}

// ═══════════════════════════ INIT ════════════════════════════
async function init() {
  // Check if already logged in
  if (S.token) {
    try {
      S.user = await fetch('/api/v1/users/me', { headers: { Authorization: 'Bearer ' + S.token } })
        .then(r => r.ok ? r.json() : null)
      if (S.user) { afterLogin(); return }
    } catch {}
  }
  // No valid session — check if any users exist
  try {
    const status = await fetch('/api/v1/users/setup-status').then(r => r.json())
    showLogin(!status.bootstrapped)  // no users → show register; has users → show login
  } catch { showLogin(true) }  // default to register if status check fails
}
init()
</script>
