<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 8px; cursor: pointer;
  color: rgb(165 180 252); font-size: 14px; transition: all .15s;
  text-decoration: none;
}
.nav-link:hover { background: rgba(99,102,241,.2); color: white; }
.nav-link.active { background: rgb(79 70 229); color: white; font-weight: 500; }
.card { background: white; border-radius: 12px; border: 1px solid rgb(229 231 235); padding: 20px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; font-size: 14px;
  font-weight: 500; cursor: pointer; transition: all .15s;
  border: none; white-space: nowrap;
}
.btn:disabled { opacity: .6; cursor: not-allowed; }
.btn-primary { background: rgb(79 70 229); color: white; }
.btn-primary:hover:not(:disabled) { background: rgb(67 56 202); }
.btn-success { background: rgb(22 163 74); color: white; }
.btn-success:hover:not(:disabled) { background: rgb(21 128 61); }
.btn-danger { background: rgb(220 38 38); color: white; }
.btn-secondary { background: white; color: rgb(55 65 81); border: 1px solid rgb(209 213 219); }
.btn-secondary:hover:not(:disabled) { background: rgb(249 250 251); }
.btn-sm { padding: 5px 12px; font-size: 13px; }
.badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 100px; font-size: 12px; font-weight: 500; }
.badge-green { background: rgb(220 252 231); color: rgb(22 101 52); }
.badge-yellow { background: rgb(254 249 195); color: rgb(133 77 14); }
.badge-blue { background: rgb(219 234 254); color: rgb(30 64 175); }
.badge-purple { background: rgb(243 232 255); color: rgb(109 40 217); }
.badge-gray { background: rgb(243 244 246); color: rgb(75 85 99); }
input[type=text], input[type=number], select, textarea {
  width: 100%; padding: 8px 12px; border: 1px solid rgb(209 213 219);
  border-radius: 8px; font-size: 14px; outline: none;
  transition: border-color .15s; background: white; box-sizing: border-box;
}
input:focus, select:focus, textarea:focus {
  border-color: rgb(99 102 241);
  box-shadow: 0 0 0 3px rgba(99,102,241,.1);
}
label { display: block; font-size: 13px; font-weight: 500; color: rgb(55 65 81); margin-bottom: 4px; }
.spinner {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.35);
  border-top-color: white; border-radius: 50%;
  animation: spin .6s linear infinite; display: inline-block; flex-shrink: 0;
}
.spinner-dark {
  width: 32px; height: 32px; border: 3px solid rgb(229 231 235);
  border-top-color: rgb(79 70 229); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.skeleton {
  background: linear-gradient(90deg, #f3f4f6 25%, #e9eaec 50%, #f3f4f6 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.table-row:hover td { background: rgb(249 250 251); }
.action-btns { opacity: 0; transition: opacity .15s; }
.table-row:hover .action-btns { opacity: 1; }
</style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

<!-- ── Sidebar ─────────────────────────────────────────────── -->
<aside class="w-56 bg-indigo-950 flex flex-col shrink-0">
  <div class="px-5 py-5 border-b border-indigo-900">
    <div class="text-white font-bold">🤖 SEO Agent</div>
    <div class="text-indigo-400 text-xs mt-0.5">AI Content Platform</div>
  </div>
  <!-- Store selector -->
  <div class="px-3 py-2 border-b border-indigo-900">
    <div class="text-indigo-400 text-xs mb-1 px-1">Active Store</div>
    <select id="store-selector" onchange="selectShop(this.value)"
      class="w-full text-xs bg-indigo-900 text-white border border-indigo-700 rounded-lg px-2 py-1.5 focus:outline-none focus:border-indigo-400">
      <option value="">— select store —</option>
    </select>
  </div>

  <nav id="sidebar-nav" class="flex-1 px-3 py-4 space-y-0.5">
    <a class="nav-link active" data-page="dashboard" onclick="nav('dashboard')">📊 Dashboard</a>
    <a class="nav-link" data-page="posts"     onclick="nav('posts')">📝 Blog Posts</a>
    <a class="nav-link" data-page="research"  onclick="nav('research')">🔍 Keyword Research</a>
    <a class="nav-link" data-page="topics"    onclick="nav('topics')">🗂 Topic Clusters</a>
    <a class="nav-link" data-page="generate"  onclick="nav('generate')">✍️ Generate Article</a>
    <a class="nav-link" data-page="audit"     onclick="nav('audit')">📈 SEO Audit</a>
    <a class="nav-link hidden" id="kb-nav-link" data-page="knowledge" onclick="nav('knowledge')">🧠 Knowledge Base</a>
    <a class="nav-link" data-page="brand"     onclick="nav('brand')">🎨 Brand Profile</a>
    <div id="admin-nav" class="hidden">
      <div class="border-t border-indigo-900 my-2"></div>
      <a class="nav-link" data-page="users" onclick="nav('users')">👥 Users</a>
    </div>
  </nav>

  <!-- User info -->
  <div class="px-3 py-3 border-t border-indigo-900">
    <div id="user-info" class="flex items-center gap-2">
      <div class="w-7 h-7 bg-indigo-700 rounded-full flex items-center justify-center text-xs text-white font-bold" id="user-avatar">?</div>
      <div class="flex-1 min-w-0">
        <div class="text-white text-xs font-medium truncate" id="user-name">—</div>
        <div class="text-indigo-400 text-xs" id="user-role">—</div>
      </div>
      <button onclick="doLogout()" class="text-indigo-400 hover:text-white text-xs" title="Logout">⎋</button>
    </div>
  </div>
</aside>

<!-- ── Main area ───────────────────────────────────────────── -->
<div class="flex-1 flex flex-col overflow-hidden">
  <header class="bg-white border-b border-gray-200 px-6 h-14 flex items-center justify-between shrink-0">
    <h1 id="page-title" class="text-base font-semibold text-gray-800">Dashboard</h1>
    <div id="header-actions" class="flex items-center gap-2"></div>
  </header>
  <main id="content" class="flex-1 overflow-auto p-6"></main>
</div>

<!-- ── Toast ──────────────────────────────────────────────── -->
<div id="toasts" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 items-end pointer-events-none"></div>

<!-- ── Modal ──────────────────────────────────────────────── -->
<div id="modal-bg" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center p-4"
  onclick="if(event.target===this)closeModal()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[88vh] flex flex-col" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 shrink-0">
      <h3 id="modal-title" class="font-semibold text-gray-800 text-sm truncate pr-4"></h3>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-xl leading-none shrink-0">×</button>
    </div>
    <div id="modal-body" class="flex-1 overflow-auto p-5"></div>
    <div id="modal-footer" class="px-5 py-4 border-t border-gray-100 flex gap-2 justify-end shrink-0"></div>
  </div>
</div>

<script>
// ═══════════════════════════ STATE ═══════════════════════════
const S = {
  page: 'dashboard',
  posts: [],
  postsPage: 1,
  postsSource: '',
  postsSearch: '',
  postsStatus: '',
  channels: [],
  research: null,
  generated: null,
  topicPlan: null,
  auditTab: 'blog',
  auditResults: null,
  rankingResults: null,
  brandProfile: null,
  allBrands: [],
  selectedBrandDomain: null,
  // Auth
  token: localStorage.getItem('seo_token') || '',
  user: null,
  // Store context
  currentShop: localStorage.getItem('seo_shop') || '',
  myStores: [],
  gscDays: 28,
  planResult: null,
  rankingKeywords: '',
}
let outlineItems = ['Introduction', 'Main content', 'Key takeaways', 'FAQ']

// Outline templates keyed by article type. Selecting one replaces outlineItems.
const OUTLINE_TEMPLATES = {
  'qa':         ['Introduction', 'The main question explained', 'Detailed answer', 'Related questions people ask', 'Quick summary'],
  'info':       ['Introduction', 'What is it?', 'Why it matters', 'How it works', 'Real-world examples', 'Key takeaways'],
  'tips':       ['Introduction', 'Tip 1', 'Tip 2', 'Tip 3', 'Tip 4', 'Tip 5', 'Bonus tip', 'Conclusion'],
  'fun_fact':   ['Introduction', 'Fact #1', 'Fact #2', 'Fact #3', 'Fact #4', 'Fact #5', 'Why these facts matter', 'Wrap-up'],
  'product':    ['Introduction', 'The problem you face', 'Our solution', 'Key features', 'How to use it', 'Customer reviews', 'Where to buy'],
  'listicle':   ['Introduction', '#1', '#2', '#3', '#4', '#5', 'Honorable mentions', 'Conclusion'],
  'comparison': ['Introduction', 'Option A overview', 'Option B overview', 'Side-by-side comparison', 'Which one to choose', 'Final verdict'],
  'howto':      ['Introduction', 'What you will need', 'Step 1', 'Step 2', 'Step 3', 'Common mistakes to avoid', 'Pro tips', 'Conclusion'],
}
const ARTICLE_TYPE_LABELS = {
  qa: '❓ Q&A',
  info: '📚 Informational',
  tips: '💡 Tips & Tricks',
  fun_fact: '🎲 Fun Facts',
  product: '🛍 Product Promotion',
  listicle: '📋 Listicle',
  comparison: '⚖️ Comparison',
  howto: '🛠 How-to Guide',
}

// ═══════════════════════════ API ═════════════════════════════
const NO_AUTH_PATHS = ['/api/v1/users/login', '/api/v1/users/register', '/api/v1/users/setup-status']
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } }
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token
  if (body !== undefined) opts.body = JSON.stringify(body)
  const r = await fetch(path, opts)
  if (r.status === 401 && !NO_AUTH_PATHS.includes(path)) { showLogin(false); throw new Error('Session expired') }
  const text = await r.text()
  let data
  try { data = JSON.parse(text) } catch { data = { detail: text } }
  if (!r.ok) throw new Error(data?.detail || `HTTP ${r.status}`)
  return data
}
const GET  = p => api('GET', p)
const POST = (p, b) => api('POST', p, b ?? {})
const PUT  = (p, b) => api('PUT',  p, b ?? {})
const DEL  = p => api('DELETE', p)

// ═══════════════════════════ TOAST ═══════════════════════════
function toast(msg, type = 'info') {
  const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-indigo-600' }
  const el = document.createElement('div')
  el.className = `pointer-events-auto px-4 py-3 rounded-xl text-white text-sm shadow-lg max-w-sm ${colors[type]}`
  el.textContent = msg
  document.getElementById('toasts').appendChild(el)
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300) }, 4000)
}

// ═══════════════════════════ MODAL ═══════════════════════════
function openModal(title, bodyHtml, footerHtml = '') {
  document.getElementById('modal-title').textContent = title
  document.getElementById('modal-body').innerHTML = bodyHtml
  document.getElementById('modal-footer').innerHTML = footerHtml
  document.getElementById('modal-bg').classList.remove('hidden')
}
function closeModal() {
  document.getElementById('modal-bg').classList.add('hidden')
}

// ═══════════════════════════ NAV ═════════════════════════════
function nav(page) {
  S.page = page
  document.querySelectorAll('.nav-link').forEach(el =>
    el.classList.toggle('active', el.dataset.page === page))
  const titles = { dashboard: 'Dashboard', posts: 'Blog Posts', research: 'Keyword Research', topics: 'Topic Clusters', generate: 'Generate Article', audit: 'SEO Audit', knowledge: 'Knowledge Base', users: 'User Management', brand: 'Brand Profile' }
  document.getElementById('page-title').textContent = titles[page] || page
  const pages = { dashboard: renderDashboard, posts: renderPosts, research: renderResearch, topics: renderTopics, generate: renderGenerate, audit: renderAudit, knowledge: renderKnowledge, users: renderUsers, brand: renderBrand }
  pages[page]?.()
}

// ─────────────────────────── helpers ─────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}
function statusBadge(s) {
  const m = { published: 'badge-green', draft: 'badge-yellow' }
  return `<span class="badge ${m[s]||'badge-gray'}">${esc(s||'?')}</span>`
}
function sourceBadge(s) {
  const m = { synced: 'badge-blue', generated: 'badge-purple' }
  return `<span class="badge ${m[s]||'badge-gray'}">${esc(s||'?')}</span>`
}
function skeletons(n, h = 'h-8') {
  return Array(n).fill(`<div class="skeleton ${h} mb-2 rounded-lg"></div>`).join('')
}
function loading(el, html) { if (el) el.innerHTML = html }

// ═══════════════════════ DASHBOARD ═══════════════════════════
async function renderDashboard() {
  const isAdmin = S.user?.role === 'admin'
  const hasShop = !!S.currentShop
  document.getElementById('header-actions').innerHTML =
    `${isAdmin ? `<button class="btn btn-secondary btn-sm" onclick="openConnectModal()">🔗 Connect Shopify</button>` : ''}
     <button class="btn btn-primary btn-sm" id="sync-btn" onclick="syncShopify()" ${hasShop ? '' : 'disabled'} title="${hasShop ? 'Sync ' + S.currentShop : 'Select a store first'}">🔄 Sync${hasShop ? ' ' + S.currentShop : ''}</button>`

  document.getElementById('content').innerHTML = `
    <div id="shopify-status-bar" class="mb-4"></div>
    <div class="grid grid-cols-4 gap-4 mb-5" id="stat-cards">${skeletons(4,'h-24')}</div>
    <div class="card">
      <div class="text-sm font-semibold text-gray-700 mb-3">Recent Posts</div>
      <div id="recent-posts">${skeletons(5)}</div>
    </div>`

  // Load Shopify connection status (admin sees all stores, member sees only their accessible ones)
  try {
    const stores = isAdmin
      ? (await GET('/auth/shopify/status')).map(s => ({ shop: s.shop, scope: s.scope }))
      : (await GET('/api/v1/users/stores/accessible')).map(s => ({ shop: s.shop_domain, scope: (s.scopes||[]).join(',') }))
    const bar = document.getElementById('shopify-status-bar')
    if (bar) {
      if (stores.length > 0) {
        bar.innerHTML = stores.map(s => `
          <div class="flex items-center gap-2 text-sm text-green-700 bg-green-50 border border-green-200 rounded-xl px-4 py-2 mb-2">
            <span>✅</span>
            <span><strong>${esc(s.shop)}</strong> connected · scopes: ${esc(s.scope||'—')}</span>
          </div>`).join('')
      } else if (isAdmin) {
        bar.innerHTML = `
          <div class="flex items-center justify-between text-sm bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-2">
            <span class="text-amber-800">⚠️ No Shopify store connected yet</span>
            <button class="btn btn-primary btn-sm" onclick="openConnectModal()">🔗 Connect Now</button>
          </div>`
      } else {
        bar.innerHTML = `
          <div class="flex items-center text-sm bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-2">
            <span class="text-amber-800">⚠️ No store assigned to you yet. Contact an admin.</span>
          </div>`
      }
    }
  } catch(e) {}

  try {
    const sp = S.currentShop ? `&shop_domain=${encodeURIComponent(S.currentShop)}` : ''
    const [postsResp, clusters] = await Promise.all([
      GET(`/api/v1/blogs/?limit=10&page=1${sp}`),
      GET('/api/v1/topics/?limit=100'),
    ])
    const posts = postsResp.items || []
    const totalPosts = postsResp.total ?? posts.length
    const published = posts.filter(p => p.status === 'published').length
    const drafts    = posts.filter(p => p.status === 'draft').length

    document.getElementById('stat-cards').innerHTML = [
      { icon: '📝', label: 'Total Posts',     value: totalPosts,       color: 'indigo' },
      { icon: '✅', label: 'Published',        value: published,        color: 'green'  },
      { icon: '📋', label: 'Drafts',           value: drafts,           color: 'yellow' },
      { icon: '🗂', label: 'Topic Clusters',   value: clusters.length,  color: 'purple' },
    ].map(s => `
      <div class="card flex items-center gap-4 cursor-pointer hover:shadow-md transition-shadow" onclick="nav('posts')">
        <div class="text-3xl">${s.icon}</div>
        <div>
          <div class="text-2xl font-bold text-gray-800">${s.value}</div>
          <div class="text-sm text-gray-400">${s.label}</div>
        </div>
      </div>`).join('')

    document.getElementById('recent-posts').innerHTML = posts.length === 0
      ? `<div class="text-sm text-gray-400 py-6 text-center">No posts yet. Sync Shopify or generate an article.</div>`
      : `<table class="w-full text-sm">
          <thead><tr class="text-left text-gray-400 border-b text-xs uppercase">
            <th class="pb-2 font-medium">Title</th>
            <th class="pb-2 font-medium">Keyword</th>
            <th class="pb-2 font-medium">Status</th>
            <th class="pb-2 font-medium">Source</th>
          </tr></thead>
          <tbody>${posts.map(p => `
            <tr class="border-b border-gray-50 table-row cursor-pointer" onclick="nav('posts')">
              <td class="py-2 font-medium text-gray-800 max-w-xs"><div class="truncate">${esc(p.title)}</div></td>
              <td class="py-2 text-gray-500 max-w-[130px]"><div class="truncate">${esc(p.focus_keyword||'—')}</div></td>
              <td class="py-2">${statusBadge(p.status)}</td>
              <td class="py-2">${sourceBadge(p.source)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`
  } catch(e) { toast('Load failed: ' + e.message, 'error') }
}

async function syncShopify() {
  if (!S.currentShop) {
    toast('Select a store to sync first', 'error')
    return
  }
  const btn = document.getElementById('sync-btn')
  btn.disabled = true
  btn.innerHTML = `<span class="spinner"></span> Syncing ${S.currentShop}…`
  try {
    const r = await POST(`/api/v1/init/shopify?shop_domain=${encodeURIComponent(S.currentShop)}`)
    toast(`✅ ${S.currentShop}: ${r.articles_synced} new · ${r.articles_updated} updated`, 'success')
    renderDashboard()
  } catch(e) { toast('Sync failed: ' + e.message, 'error') }
  finally { btn.disabled = false; btn.innerHTML = '🔄 Sync' }
}

// ═══════════════════════ BLOG POSTS ══════════════════════════
async function renderPosts() {
  document.getElementById('header-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="nav('generate')">✍️ New Article</button>`

  document.getElementById('content').innerHTML = `
    <div class="card mb-4">
      <div class="flex gap-3">
        <input type="text" id="ps-search" placeholder="Search title or keyword…" value="${esc(S.postsSearch)}"
          style="flex:1" onkeyup="if(event.key==='Enter'){S.postsSearch=this.value;S.postsPage=1;loadPosts()}">
        <select id="ps-source" style="width:150px" onchange="S.postsSource=this.value;S.postsPage=1;loadPosts()">
          <option value="">All sources</option>
          <option value="synced"    ${S.postsSource==='synced'?'selected':''}>Synced</option>
          <option value="generated" ${S.postsSource==='generated'?'selected':''}>Generated</option>
        </select>
        <select id="ps-status" style="width:140px" onchange="S.postsStatus=this.value;S.postsPage=1;loadPosts()">
          <option value="">All status</option>
          <option value="published" ${S.postsStatus==='published'?'selected':''}>Published</option>
          <option value="draft"     ${S.postsStatus==='draft'?'selected':''}>Draft</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="S.postsSearch=document.getElementById('ps-search').value;S.postsPage=1;loadPosts()">Search</button>
      </div>
    </div>
    <div class="card">
      <div id="posts-table">${skeletons(8)}</div>
      <div id="posts-pager" class="mt-4 flex justify-between items-center text-sm text-gray-500"></div>
    </div>`

  loadPosts()
}

async function loadPosts() {
  const q = new URLSearchParams({
    page: S.postsPage, limit: 20,
    ...(S.postsSource && { source: S.postsSource }),
    ...(S.postsSearch && { keyword: S.postsSearch }),
    ...(S.currentShop && { shop_domain: S.currentShop }),
  })
  try {
    const resp = await GET(`/api/v1/blogs/?${q}`)
    let posts = resp.items || []
    const total = resp.total ?? posts.length
    const totalPages = resp.total_pages ?? 1
    if (S.postsStatus) posts = posts.filter(p => p.status === S.postsStatus)
    S.posts = posts

    const tbl = document.getElementById('posts-table')
    const pager = document.getElementById('posts-pager')
    if (!tbl) return

    if (!posts.length) {
      tbl.innerHTML = `<div class="py-12 text-center text-gray-400 text-sm">No posts found.</div>`
      if (pager) pager.innerHTML = total > 0
        ? `<div>Filtered to 0 results from ${total} total — try clearing filters.</div><div></div>`
        : ''
      return
    }

    tbl.innerHTML = `
      <table class="w-full text-sm">
        <thead><tr class="text-left text-gray-400 border-b text-xs uppercase">
          <th class="pb-3 font-medium">Title</th>
          <th class="pb-3 font-medium w-36">Keyword</th>
          <th class="pb-3 font-medium w-24">Status</th>
          <th class="pb-3 font-medium w-24">Source</th>
          <th class="pb-3 font-medium w-32">Actions</th>
        </tr></thead>
        <tbody>${posts.map(p => `
          <tr class="border-b border-gray-50 table-row">
            <td class="py-3 pr-3">
              <div class="font-medium text-gray-800 truncate max-w-xs">${esc(p.title)}</div>
              ${p.platform_url
                ? `<a href="${esc(p.platform_url)}" target="_blank" class="text-xs text-indigo-500 hover:underline">View on store ↗</a>`
                : `<span class="text-xs text-gray-300">Not published</span>`}
            </td>
            <td class="py-3 pr-3 text-gray-500 truncate max-w-[144px]">${esc(p.focus_keyword||'—')}</td>
            <td class="py-3 pr-3">${statusBadge(p.status)}</td>
            <td class="py-3 pr-3">${sourceBadge(p.source)}</td>
            <td class="py-3">
              <div class="action-btns flex gap-1">
                <button class="btn btn-secondary btn-sm" onclick="viewPost(${p.id})">View</button>
                ${p.status==='draft'
                  ? `<button class="btn btn-success btn-sm" onclick="openPublishModal(${p.id},'${esc(p.title)}')">Publish</button>`
                  : ''}
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`

    if (pager) {
      const from = (S.postsPage - 1) * 20 + 1
      const to   = (S.postsPage - 1) * 20 + posts.length
      const prevDisabled = S.postsPage <= 1
      const nextDisabled = S.postsPage >= totalPages
      pager.innerHTML = `
        <div>Showing <strong>${from}–${to}</strong> of <strong>${total}</strong> post${total===1?'':'s'}</div>
        <div class="flex items-center gap-2">
          <button class="btn btn-secondary btn-sm" ${prevDisabled?'disabled':''} onclick="gotoPostsPage(${S.postsPage-1})">← Prev</button>
          <span class="text-xs text-gray-400">Page ${S.postsPage} / ${totalPages || 1}</span>
          <button class="btn btn-secondary btn-sm" ${nextDisabled?'disabled':''} onclick="gotoPostsPage(${S.postsPage+1})">Next →</button>
        </div>`
    }
  } catch(e) {
    const tbl = document.getElementById('posts-table')
    if (tbl) tbl.innerHTML = `<div class="text-red-500 text-sm py-4 text-center">Error: ${esc(e.message)}</div>`
  }
}

function gotoPostsPage(p) {
  if (p < 1) return
  S.postsPage = p
  loadPosts()
  window.scrollTo({top: 0, behavior: 'smooth'})
}

async function viewPost(id) {
  openModal('Loading…', `<div class="flex items-center justify-center py-12"><div class="spinner-dark"></div></div>`)
  try {
    const p = await GET(`/api/v1/generate/article/${id}/content`)
    _renderViewPost(id, p)
  } catch(e) {
    document.getElementById('modal-body').innerHTML = `<div class="text-red-500 text-sm">Error: ${esc(e.message)}</div>`
  }
}

  const isDraft = p.status === 'draft'
  document.getElementById('modal-body').innerHTML = `
    <div class="flex gap-2 flex-wrap mb-3">${statusBadge(p.status)}</div>
    <div class="text-xs bg-gray-50 rounded-lg p-3 space-y-1 mb-3" id="meta-box">
      <div><span class="text-gray-400">SEO Title:</span> ${esc(p.seo_title||'—')}</div>
      <div><span class="text-gray-400">Meta:</span> ${esc(p.seo_description||'—')}</div>
      <div><span class="text-gray-400">Tags:</span> ${(p.tags||[]).join(', ')||'—'}</div>
    </div>
    <div id="image-section" class="mb-3">${renderFeaturedImage(id, p, isDraft)}</div>
    <div class="border border-gray-200 rounded-xl overflow-hidden">

      <textarea id="rw-instructions" rows="4"

      <button class="btn btn-primary btn-sm mt-2 w-full" style="justify-content:center" id="rw-btn" onclick="doRewrite(${id})">

      </button>
      <div id="rw-status" class="text-xs text-gray-400 mt-1"></div>

// ─────────────────── Edit draft ──────────────────────────────

  document.getElementById('modal-body').innerHTML = `
    <div class="space-y-3">

        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Title</label>

        <input id="ed-seo-title" class="input mt-1" maxlength="70" value="${esc(p.seo_title||'')}">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Meta Description <span class="text-gray-400 font-normal">(155 chars)</span></label>
        <textarea id="ed-meta" rows="2" class="mt-1" maxlength="200">${esc(p.seo_description||'')}</textarea>
      </div>
      <div>

    <button class="btn btn-primary btn-sm" id="ed-save-btn" onclick="savePost(${id})">💾 Save Changes</button>
    <button class="btn btn-secondary btn-sm" onclick="viewPost(${id})">Cancel</button>`
}

async function savePost(id) {
  const btn = document.getElementById('ed-save-btn')
  btn.disabled = true; btn.textContent = 'Saving…'
  const tags = (document.getElementById('ed-tags').value || '')
    .split(',').map(t => t.trim()).filter(Boolean)
  try {
    await PUT(`/api/v1/generate/article/${id}`, {
      title:           document.getElementById('ed-title').value.trim(),
      seo_title:       document.getElementById('ed-seo-title').value.trim(),
      seo_description: document.getElementById('ed-meta').value.trim(),
      tags,
      content_html:    document.getElementById('ed-content').value,
    })
    toast('✅ Draft saved', 'success')
    viewPost(id)          // return to view mode with fresh data
    renderPosts()         // refresh list in background
  } catch(e) {
    toast('Save failed: ' + e.message, 'error')
    btn.disabled = false; btn.textContent = '💾 Save Changes'
  }
}

// ─────────────────── Delete draft ──────────────────────────────
function confirmDeletePost(id) {
  const footer = document.getElementById('modal-footer')
  footer.innerHTML = `
    <span class="text-sm text-red-600 font-medium">Delete this draft permanently?</span>
    <button class="btn btn-sm" style="background:#dc2626;color:#fff" onclick="doDeletePost(${id})">Yes, Delete</button>
    <button class="btn btn-secondary btn-sm" onclick="viewPost(${id})">Cancel</button>`
}

async function doDeletePost(id) {
  try {
    await DEL(`/api/v1/generate/article/${id}`)
    toast('Draft deleted', 'success')
    closeModal()
    renderPosts()
  } catch(e) {
    toast('Delete failed: ' + e.message, 'error')
  }
}

// ─────────────────── Re-write ──────────────────────────────────
async function doRewrite(postId) {
  const instructions = document.getElementById('rw-instructions')?.value?.trim()
  if (!instructions) { toast('Enter rewrite instructions', 'error'); return }

  const btn = document.getElementById('rw-btn')
  const status = document.getElementById('rw-status')
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Rewriting with GPT-4o…'
  if (status) status.textContent = 'This takes 20–40 seconds…'

  try {
    const r = await POST(`/api/v1/generate/article/${postId}/rewrite`, {
      instructions,
      shop_domain: S.currentShop || '',
    })

    // Refresh the preview with new content
    const iframe = document.getElementById('preview-frame')
    if (iframe) iframe.srcdoc =
      `<style>body{font-family:system-ui,sans-serif;padding:20px;font-size:14px;line-height:1.7;max-width:760px;margin:0 auto;color:#1f2937}h1,h2,h3{color:#111827}a{color:#4f46e5}</style>` +
      (r.content_html || '')

    // Update meta display
    document.querySelector('#modal-body .text-xs.bg-gray-50').innerHTML =
      `<div><span class="text-gray-400">SEO Title:</span> ${esc(r.seo_title||'—')}</div>
       <div><span class="text-gray-400">Meta:</span> ${esc(r.seo_description||'—')}</div>
       <div><span class="text-gray-400">Tags:</span> ${(r.tags||[]).join(', ')||'—'}</div>`

    document.getElementById('rw-instructions').value = ''
    if (status) {
      status.textContent = `✅ Rewritten! (${r.usage?.output_tokens||0} tokens used)`
      status.className = 'text-xs text-green-600 mt-1'
    }
    toast('✅ Article rewritten and saved as draft', 'success')
  } catch(e) {
    if (status) { status.textContent = 'Error: ' + e.message; status.className = 'text-xs text-red-500 mt-1' }
    toast('Rewrite failed: ' + e.message, 'error')
  } finally {
    btn.disabled = false
    btn.innerHTML = '✏️ Re-write with GPT-4o'
  }
}

// ─────────────────── Feedback helpers ─────────────────────────
let _fbRating = 0
function setRating(n) {
  _fbRating = n
  document.querySelectorAll('#star-row button').forEach(btn => {
    btn.textContent = parseInt(btn.dataset.star) <= n ? '★' : '☆'
    btn.style.color = parseInt(btn.dataset.star) <= n ? '#f59e0b' : ''
  })
}

async function submitFeedback(postId) {
  if (!_fbRating) { toast('Please select a rating', 'error'); return }
  const body = {
    rating: _fbRating,
    feedback_text: document.getElementById('fb-text')?.value || '',
    improvement_notes: document.getElementById('fb-improve')?.value || '',
    shop_domain: S.currentShop || '',
  }
  try {
    await POST(`/api/v1/generate/article/${postId}/feedback`, body)
    document.getElementById('fb-status').textContent = '✅ Feedback saved! The agent will apply these improvements to future articles.'
    document.getElementById('fb-status').className = 'text-xs text-green-600 mt-1'
    _fbRating = 0
    loadArticleHistory(postId)
  } catch(e) { toast('Failed to save feedback: ' + e.message, 'error') }
}

// ─────────────────── History timeline ────────────────────────
async function loadArticleHistory(postId) {
  const box = document.getElementById('history-list')
  if (!box) return
  try {
    const items = await GET(`/api/v1/generate/article/${postId}/history`)
    if (!items.length) {
      box.innerHTML = `<div class="py-3 text-center text-gray-400">No edits or feedback yet.</div>`
      return
    }
    box.innerHTML = items.map((it, i) => it.type === 'feedback'
      ? renderHistoryFeedback(it)
      : renderHistoryEdit(it, i)
    ).join('')
  } catch(e) {
    box.innerHTML = `<div class="text-red-500 py-2">Error: ${esc(e.message)}</div>`
  }
}

function renderHistoryFeedback(it) {
  const stars = '★'.repeat(it.rating) + '☆'.repeat(5 - it.rating)
  return `
    <div class="border-l-2 border-amber-300 pl-3 py-2 mb-2 bg-amber-50/40 rounded-r">
      <div class="flex justify-between items-center">
        <div class="text-amber-600 font-medium">${stars} <span class="text-gray-600 ml-1">Feedback</span></div>
        <div class="text-[10px] text-gray-400">${fmtTime(it.created_at)}${it.user ? ' · ' + esc(it.user) : ''}</div>
      </div>
      ${it.feedback_text     ? `<div class="mt-1 text-gray-700">${esc(it.feedback_text)}</div>` : ''}
      ${it.improvement_notes ? `<div class="mt-1 text-gray-500 italic">💡 ${esc(it.improvement_notes)}</div>` : ''}
    </div>`
}

function renderHistoryEdit(it, i) {
  const metaRows = []
  if (it.title_before !== null && it.title_after !== null)
    metaRows.push(`<div><span class="text-gray-400">Title:</span> <s class="text-red-500">${esc(it.title_before||'—')}</s> → <span class="text-green-700">${esc(it.title_after||'—')}</span></div>`)
  if (it.seo_title_before !== null && it.seo_title_after !== null)
    metaRows.push(`<div><span class="text-gray-400">SEO Title:</span> <s class="text-red-500">${esc(it.seo_title_before||'—')}</s> → <span class="text-green-700">${esc(it.seo_title_after||'—')}</span></div>`)
  if (it.seo_description_before !== null && it.seo_description_after !== null)
    metaRows.push(`<div><span class="text-gray-400">Meta:</span> <s class="text-red-500">${esc(it.seo_description_before||'—')}</s> → <span class="text-green-700">${esc(it.seo_description_after||'—')}</span></div>`)
  if (it.tags_before !== null && it.tags_after !== null)
    metaRows.push(`<div><span class="text-gray-400">Tags:</span> <s class="text-red-500">${esc((it.tags_before||[]).join(', '))}</s> → <span class="text-green-700">${esc((it.tags_after||[]).join(', '))}</span></div>`)
  const hasDiff = !!it.content_diff
  return `
    <div class="border-l-2 border-indigo-300 pl-3 py-2 mb-2 bg-indigo-50/40 rounded-r">
      <div class="flex justify-between items-center">
        <div class="text-indigo-600 font-medium">✏️ Edit · ${esc(it.summary || '(no summary)')}</div>
        <div class="text-[10px] text-gray-400">${fmtTime(it.created_at)}${it.user ? ' · ' + esc(it.user) : ''}</div>
      </div>
      ${metaRows.length ? `<div class="mt-1 space-y-0.5">${metaRows.join('')}</div>` : ''}
      ${hasDiff ? `
        <button class="mt-1 text-[11px] text-indigo-500 hover:underline" onclick="this.nextElementSibling.classList.toggle('hidden')">
          Show content diff (+${it.lines_added}/-${it.lines_removed})
        </button>
        <pre class="hidden mt-1 text-[11px] bg-white border rounded p-2 max-h-60 overflow-auto whitespace-pre-wrap">${esc(it.content_diff)}</pre>
      ` : ''}
    </div>`
}

function fmtTime(iso) {
  try {
    const d = new Date(iso)
    return d.toLocaleString()
  } catch { return iso || '' }
}

// ─────────────────── Featured image ──────────────────────────
function renderFeaturedImage(postId, p, canEdit) {
  const url = p.featured_image_url
  const prompt = p.image_prompt || ''
  const imgHtml = url
    ? `<img src="${esc(url)}" alt="${esc(p.title)}"
         class="w-full rounded-xl border border-gray-200 object-cover" style="max-height:280px">`
    : `<div class="w-full rounded-xl border border-dashed border-gray-300 bg-gray-50 text-gray-400 text-sm flex items-center justify-center" style="height:140px">
         No featured image yet${canEdit ? ' — click "Generate image" below' : ''}
       </div>`
  return `
    <div class="text-sm font-semibold text-gray-700 mb-2">🖼 Featured Image</div>
    ${imgHtml}
    ${canEdit ? `
      <details class="mt-2">
        <summary class="text-xs text-indigo-500 cursor-pointer hover:underline">
          ${url ? '🎨 Regenerate image' : '🎨 Generate image'} — edit prompt
        </summary>
        <div class="mt-2 space-y-2">
          <textarea id="img-prompt-${postId}" rows="3" class="text-xs"
            placeholder="DALL·E prompt — describe the banner you want">${esc(prompt)}</textarea>
          <button class="btn btn-secondary btn-sm" onclick="doRegenerateImage(${postId})" id="img-gen-btn-${postId}">
            ${url ? '🔄 Regenerate' : '🎨 Generate'}
          </button>
          <div id="img-status-${postId}" class="text-xs text-gray-400"></div>
        </div>
      </details>
    ` : ''}`
}

async function doRegenerateImage(postId) {
  const ta = document.getElementById(`img-prompt-${postId}`)
  const btn = document.getElementById(`img-gen-btn-${postId}`)
  const status = document.getElementById(`img-status-${postId}`)
  const prompt = ta?.value.trim() || ''
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Generating…'
  status.textContent = 'Calling DALL·E 3 — ~10–20 seconds'
  try {
    const r = await POST(`/api/v1/generate/article/${postId}/regenerate-image`, {
      slot: 'featured',
      prompt: prompt || null,
      size: '1536x1024',
    })
    // Re-render the image section in place using the latest post payload
    const fresh = await GET(`/api/v1/generate/article/${postId}/content`)
    const section = document.getElementById('image-section')
    if (section) section.innerHTML = renderFeaturedImage(postId, fresh, true)
    toast('✅ Image updated', 'success')
  } catch(e) {
    btn.disabled = false; btn.innerHTML = '🔄 Regenerate'
    status.textContent = '❌ ' + e.message
  }
}

// ─────────────────── Publish modal ────────────────────────────
async function openPublishModal(postId, title) {
  const chOpts = S.channels.map(c =>
    `<option value="${esc(c.platform_id)}">${esc(c.title)} (ID: ${c.platform_id})</option>`).join('')
  const savedBlogId = localStorage.getItem(`seo_pref_blogid_${S.currentShop}`) || ''

  // Check if the draft already has a featured image
  let hasImage = false
  try {
    const p = await GET(`/api/v1/generate/article/${postId}/content`)
    hasImage = !!p.featured_image_url
  } catch {}

  openModal(`Publish: ${title}`, `
    <div class="space-y-4">
      <div>
        <label>Shopify Blog ID <span class="text-red-500">*</span></label>
        <input type="number" id="pub-blog-id" placeholder="e.g. 12345678" value="${savedBlogId}">
        ${chOpts ? `<select class="mt-2" onchange="document.getElementById('pub-blog-id').value=this.value">
          <option value="">— Pick from synced blogs —</option>${chOpts}
        </select>` : `<div class="text-xs text-gray-400 mt-1">Shopify Admin → Online Store → Blog posts → copy numeric ID from URL</div>`}
      </div>
      <div>
        <label>Author</label>
        <input type="text" id="pub-author" value="${esc(S.user?.name || 'SEO Agent')}">
      </div>
      <div class="flex items-center gap-2 text-xs ${hasImage ? 'text-green-700 bg-green-50 border-green-200' : 'text-amber-700 bg-amber-50 border-amber-200'} border rounded-lg px-3 py-2">
        ${hasImage
          ? '🖼 Featured image is set — will be uploaded to Shopify.'
          : '⚠️ No featured image set. The article will publish without one. Add an image in the draft view first.'}
      </div>
      <div class="flex items-center gap-3 py-1">
        <input type="checkbox" id="pub-live" checked class="w-4 h-4 rounded accent-indigo-600">
        <label for="pub-live" class="!mb-0 cursor-pointer">Publish immediately (uncheck = save as Shopify draft)</label>
      </div>
    </div>`,
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary btn-sm" id="do-pub-btn" onclick="doPublish(${postId})">🚀 Publish</button>`)
}

async function doPublish(postId) {
  const blogId = parseInt(document.getElementById('pub-blog-id').value)
  if (!blogId) { toast('Enter a Shopify Blog ID', 'error'); return }

  const published = document.getElementById('pub-live').checked
  const author    = document.getElementById('pub-author').value

  const btn = document.getElementById('do-pub-btn')
  btn.disabled = true
  btn.innerHTML = `<span class="spinner"></span> Publishing…`

  try {
    const r = await POST(`/api/v1/publish/${postId}/shopify`, {
      blog_id: blogId, shop_domain: S.currentShop || null, author, published,
    })
    localStorage.setItem(`seo_pref_blogid_${S.currentShop}`, blogId)
    closeModal()
    toast(`✅ Published! ${r.platform_url || ''}`, 'success')
    if (S.page === 'posts') loadPosts()
  } catch(e) {
    toast('Publish failed: ' + e.message, 'error')
    btn.disabled = false
    btn.innerHTML = '🚀 Publish'
  }
}

// ═══════════════════ KEYWORD RESEARCH ════════════════════════
function renderResearch() {
  document.getElementById('header-actions').innerHTML = ''
  document.getElementById('content').innerHTML = `
    <div class="card mb-4">
      <div class="flex gap-3">
        <input type="text" id="kw-q" placeholder="Enter keyword, e.g. đồng hồ cơ nam"
          style="flex:1" onkeyup="if(event.key==='Enter')doResearch()">
        <select id="kw-country" style="width:100px">
          <option value="vn" selected>🇻🇳 VN</option>
          <option value="us">🇺🇸 US</option>
          <option value="gb">🇬🇧 GB</option>
        </select>
        <select id="kw-lang" style="width:110px">
          <option value="vi" selected>Vietnamese</option>
          <option value="en">English</option>
        </select>
        <button class="btn btn-primary" id="res-btn" onclick="doResearch()">🔍 Research</button>
      </div>
    </div>
    <div id="res-out"></div>`

  if (S.research) renderResearchResults(S.research)
}

async function doResearch() {
  const kw = document.getElementById('kw-q').value.trim()
  if (!kw) { toast('Enter a keyword', 'error'); return }

  const btn = document.getElementById('res-btn')
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Researching…`
  document.getElementById('res-out').innerHTML =
    `<div class="grid grid-cols-2 gap-4">${skeletons(2,'h-64')}</div>`

  try {
    const r = await POST('/api/v1/research/', {
      keyword: kw,
      country: document.getElementById('kw-country').value,
      language: document.getElementById('kw-lang').value,
    })
    S.research = r
    renderResearchResults(r)
  } catch(e) { toast('Research failed: ' + e.message, 'error'); document.getElementById('res-out').innerHTML = '' }
  finally { btn.disabled = false; btn.innerHTML = '🔍 Research' }
}

function renderResearchResults(r) {

let _dragIdx = null

function renderOutline() {
  const el = document.getElementById('outline-list')
  if (!el) return
  el.innerHTML = outlineItems.map((item, i) => `
    <div class="flex gap-1 items-center outline-row" draggable="true" data-idx="${i}"
      ondragstart="outlineDragStart(event,${i})"
      ondragover="outlineDragOver(event)"
      ondragleave="outlineDragLeave(event)"
      ondrop="outlineDrop(event,${i})"
      ondragend="outlineDragEnd(event)"
      style="border-top:2px solid transparent;border-radius:4px">
      <span title="Drag to reorder" style="cursor:grab;color:#d1d5db;font-size:18px;padding:4px 2px;user-select:none;line-height:1">⠿</span>
      <input type="text" class="flex-1" value="${esc(item)}" placeholder="H2 section…" oninput="outlineItems[${i}]=this.value">
      ${outlineItems.length > 1
        ? `<button class="btn btn-secondary btn-sm shrink-0" onclick="removeOutlineItem(${i})" style="min-width:32px;padding:4px 8px">✕</button>`
        : ''}
    </div>`).join('')
}

function outlineDragStart(e, idx) {
  _dragIdx = idx
  e.dataTransfer.effectAllowed = 'move'
  setTimeout(() => e.currentTarget && (e.currentTarget.style.opacity = '0.4'), 0)
}
function outlineDragOver(e) {
  e.preventDefault()
  e.dataTransfer.dropEffect = 'move'
  e.currentTarget.style.borderTop = '2px solid #6366f1'
}
function outlineDragLeave(e) { e.currentTarget.style.borderTop = '2px solid transparent' }
function outlineDragEnd(e) {
  e.currentTarget.style.opacity = ''
  document.querySelectorAll('.outline-row').forEach(r => r.style.borderTop = '2px solid transparent')
}
function outlineDrop(e, targetIdx) {
  e.preventDefault()
  outlineDragEnd(e)
  if (_dragIdx === null || _dragIdx === targetIdx) { _dragIdx = null; return }
  const [moved] = outlineItems.splice(_dragIdx, 1)
  outlineItems.splice(targetIdx, 0, moved)
  _dragIdx = null
  renderOutline()
}

function addOutlineItem()     { outlineItems.push(''); renderOutline() }
function removeOutlineItem(i) { outlineItems.splice(i, 1); renderOutline() }

    <div class="flex items-center justify-between px-3 py-2 bg-gray-50 border-b border-gray-100">
      <span class="text-xs font-medium text-gray-600">${label}</span>
      <div class="flex gap-1">
        <button class="btn btn-sm" style="font-size:11px;padding:2px 8px" onclick="openRegenerateImg(${postId},'${slot}')">🔄 Regenerate</button>
        ${slot === 'featured' ? `<button class="btn btn-sm" style="font-size:11px;padding:2px 8px;background:#f3f4f6;color:#374151" onclick="openAddImgSlot(${postId})">+ Add image</button>` : ''}
      </div>
    </div>
    ${url
      ? `<img src="${esc(url)}" alt="${esc(prompt)}" class="w-full object-cover" style="max-height:220px">`
      : `<div class="flex items-center justify-center text-gray-400 text-xs py-8 bg-gray-50">No image generated</div>`}
    <div class="px-3 py-1.5 text-xs text-gray-400 bg-gray-50 border-t border-gray-100 truncate" title="${esc(prompt)}">${esc(prompt||'—')}</div>
  </div>`
}

async function openRegenerateImg(postId, slot) {
  const promptInput = prompt(`Edit image prompt for "${slot}" (leave blank to reuse existing):`, '')
  if (promptInput === null) return  // user cancelled
  const el = document.getElementById(`img-slot-${postId}-${slot}`)
  if (el) el.innerHTML = `<div class="flex items-center justify-center py-8 text-xs text-gray-400"><span class="spinner-dark mr-2"></span> Generating…</div>`
  try {
    const r = await POST(`/api/v1/generate/article/${postId}/regenerate-image`, {
      slot, prompt: promptInput || undefined, size: '1536x1024'
    })
    // Update slot HTML
    if (el) el.outerHTML = _imgSlotHtml(postId, slot, r.prompt, r.image_url)
    // Also update S.generated
    if (S.generated?.id === postId) {
      if (slot === 'featured') S.generated.image_url = r.image_url
    }
    toast('✅ Image regenerated', 'success')
  } catch(e) {
    toast('Image generation failed: ' + e.message, 'error')
    if (el) el.innerHTML = `<div class="text-red-400 text-xs p-3">Error: ${esc(e.message)}</div>`
  }
}

function openAddImgSlot(postId) {
  const label = window.prompt('Section label for this image (e.g. "section-2", "comparison"):')
  if (!label || !label.trim()) return
  const customPrompt = window.prompt('Image prompt (or leave blank for auto):') || ''
  const panel = document.getElementById(`gen-img-panel-${postId}`)
  if (!panel) return
  const div = document.createElement('div')
  div.id = `img-slot-${postId}-${label.trim()}`
  div.innerHTML = `<div class="flex items-center justify-center py-8 text-xs text-gray-400 border rounded-xl mt-2"><span class="spinner-dark mr-2"></span> Generating…</div>`
  panel.appendChild(div)
  POST(`/api/v1/generate/article/${postId}/regenerate-image`, {
    slot: label.trim(), prompt: customPrompt || undefined, size: '1536x1024'
  }).then(r => {
    div.outerHTML = `<div class="mt-2">${_imgSlotHtml(postId, r.slot, r.prompt, r.image_url)}</div>`
    toast('✅ Image added', 'success')
  }).catch(e => {
    div.innerHTML = `<div class="text-red-400 text-xs p-3">Error: ${esc(e.message)}</div>`
  })
}

async function quickRate(postId, rating) {
  document.querySelectorAll(`#qstar-row-${postId} button`).forEach(btn => {
    btn.textContent = parseInt(btn.dataset.star) <= rating ? '★' : '☆'
    btn.style.color = parseInt(btn.dataset.star) <= rating ? '#f59e0b' : ''
  })
  try {
    await POST(`/api/v1/generate/article/${postId}/feedback`, {
      rating, feedback_text: '', improvement_notes: '', shop_domain: S.currentShop || ''
    })
    const st = document.getElementById(`qfb-status-${postId}`)
    if (st) st.textContent = '✅ Rated! Open article to add detailed notes.'
  } catch(e) { toast('Rating failed: ' + e.message, 'error') }
}

function renderAudit() {
  document.getElementById('header-actions').innerHTML =
    `<button class="btn btn-secondary btn-sm" onclick="renderAudit()">↻ Refresh</button>`

  const tabs = [
    { id:'blog', label:'📋 Blog Audit' },
    { id:'rankings', label:'📍 Keyword Rankings' },
    { id:'plan', label:'🎯 Ranking Plan' },
    { id:'gsc', label:'📊 Search Console' },
    { id:'suggest', label:'✨ Keyword Ideas' },
  ]
  const tabBar = tabs.map(t =>
    `<button onclick="S.auditTab='${t.id}';renderAudit()"
      class="px-4 py-2 text-sm font-medium rounded-lg transition-colors ${S.auditTab===t.id?'bg-indigo-600 text-white':'text-gray-600 hover:bg-gray-100'}">${t.label}</button>`
  ).join('')

  let body = ''
  if (S.auditTab === 'blog') body = renderAuditBlogTab()
  else if (S.auditTab === 'rankings') body = renderAuditRankingsTab()
  else if (S.auditTab === 'plan') body = renderAuditPlanTab()
  else if (S.auditTab === 'gsc') body = renderGscTab()
  else body = renderSuggestTab()

  document.getElementById('content').innerHTML = `
    <div class="space-y-4">
      <div class="card flex gap-2 p-3">${tabBar}</div>
      ${body}
    </div>`

  if (S.auditTab === 'blog' && S.auditResults) renderAuditBlogResults(S.auditResults)
  if (S.auditTab === 'rankings' && S.rankingResults) renderRankingResults(S.rankingResults)
  if (S.auditTab === 'plan' && S.planResult) renderPlanResult(S.planResult)
  if (S.auditTab === 'gsc') initGscTab()
  if (S.auditTab === 'suggest' && S.suggestionResult) renderSuggestions(S.suggestionResult)
}

function renderAuditBlogResults(results) {
  const el = document.getElementById('audit-blog-results')

  const scoreBar = s => {
    const color = s>=85?'bg-green-500':s>=70?'bg-blue-500':s>=55?'bg-yellow-500':'bg-red-500'
    return `<div class="w-full bg-gray-100 rounded-full h-1.5 mt-1"><div class="${color} h-1.5 rounded-full" style="width:${s}%"></div></div>`
  }

  el.innerHTML = `
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead><tr class="border-b border-gray-100 text-xs text-gray-500 uppercase">
          <th class="text-left py-2 pr-4">Post</th>
          <th class="text-center py-2 px-2">Score</th>
          <th class="text-center py-2 px-2">Words</th>
          <th class="text-center py-2 px-2">H2s</th>
          <th class="text-left py-2 px-2">Top Issue</th>

            <tr class="border-b border-gray-50 table-row cursor-pointer" onclick="toggleAuditRow(${i})">
              <td class="py-3 pr-4">
                <div class="font-medium text-gray-800 truncate max-w-xs" title="${esc(r.title)}">${esc(r.title)}</div>
                <div class="text-xs text-gray-400">${r.focus_keyword ? '🔑 '+esc(r.focus_keyword) : 'no keyword'}</div>
              </td>
              <td class="text-center py-3 px-2">
                <div class="font-bold text-lg ${r.score>=85?'text-green-600':r.score>=70?'text-blue-600':r.score>=55?'text-yellow-600':'text-red-600'}">${r.score}</div>
                <div class="text-xs font-bold ${r.score>=85?'text-green-500':r.score>=70?'text-blue-500':r.score>=55?'text-yellow-500':'text-red-500'}">${r.grade}</div>
                ${scoreBar(r.score)}
              </td>
              <td class="text-center py-3 px-2 text-gray-700">${r.word_count.toLocaleString()}</td>
              <td class="text-center py-3 px-2 text-gray-700">${r.h2_count}</td>
              <td class="py-3 px-2 text-gray-500 text-xs max-w-xs truncate">${r.issues[0]||'✅ No major issues'}</td>
              <td class="py-3 pl-2"><span class="text-gray-400 text-xs">${r.issues.length} issue${r.issues.length!==1?'s':''} ▾</span></td>
            </tr>
            <tr id="audit-expand-${i}" class="hidden bg-gray-50">
              <td colspan="6" class="px-4 py-3">
                <div class="space-y-1">
                  ${r.issues.length ? r.issues.map(issue => `<div class="text-xs text-amber-700 bg-amber-50 rounded px-3 py-1.5">⚠ ${esc(issue)}</div>`).join('') : '<div class="text-xs text-green-700 bg-green-50 rounded px-3 py-1.5">✅ Post looks good!</div>'}
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="mt-3 text-xs text-gray-400">Average score: ${Math.round(results.reduce((a,r)=>a+r.score,0)/results.length)}/100 across ${results.length} posts</div>`

  const btn = document.getElementById('ranking-btn')
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Checking…'
  try {
    const data = await POST('/api/v1/audit/rankings', { keywords, shop_domain: shop })
    S.rankingResults = data
    renderRankingResults(data)
  } catch(e) { toast('Check failed: ' + e.message, 'error') }
  finally { btn.disabled = false; btn.innerHTML = '📍 Check Rankings' }

function renderRankingResults(data) {
  const el = document.getElementById('ranking-results')
  if (!el) return
  const results = data.results || []
  if (!results.length) { el.innerHTML = '<p class="text-sm text-gray-400">No results.</p>'; return }

  const posBadge = pos => {
    if (!pos) return '<span class="badge badge-gray">Not ranking</span>'
    if (pos <= 3) return `<span class="badge badge-green">#${pos} 🏆</span>`
    if (pos <= 10) return `<span class="badge badge-blue">#${pos}</span>`
    if (pos <= 20) return `<span class="badge badge-yellow">#${pos}</span>`
    return `<span class="badge badge-gray">#${pos}</span>`
  }

  const ranking = results.filter(r => r.position)
  const notRanking = results.filter(r => !r.position)

  el.innerHTML = `
    <div class="overflow-x-auto mt-2">
      <table class="w-full text-sm">
        <thead><tr class="border-b border-gray-100 text-xs text-gray-500 uppercase">
          <th class="text-left py-2 pr-4">Keyword</th>
          <th class="text-center py-2 px-3">Position</th>
          <th class="text-left py-2 px-3">Ranking URL</th>
        </tr></thead>
        <tbody>
          ${results.map(r => `
            <tr class="border-b border-gray-50 table-row">
              <td class="py-2.5 pr-4 font-medium text-gray-800">${esc(r.keyword)}</td>
              <td class="text-center py-2.5 px-3">${posBadge(r.position)}</td>
              <td class="py-2.5 px-3 text-xs text-gray-500 max-w-xs truncate">
                ${r.ranking_url ? `<a href="${esc(r.ranking_url)}" target="_blank" class="text-indigo-600 hover:underline truncate block">${esc(r.ranking_title||r.ranking_url)}</a>` : '—'}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="mt-3 flex gap-3 text-xs text-gray-400">
      <span>Ranking: <strong class="text-green-600">${ranking.length}</strong></span>
      <span>Not ranking: <strong class="text-gray-500">${notRanking.length}</strong></span>
      ${ranking.length ? `<span>Best: <strong class="text-blue-600">#${Math.min(...ranking.map(r=>r.position))} for "${ranking.sort((a,b)=>a.position-b.position)[0].keyword}"</strong></span>` : ''}
    </div>
    ${S.rankingResults ? `<div class="mt-4"><button class="btn btn-primary btn-sm" onclick="S.auditTab='plan';renderAudit()">🎯 Generate Ranking Plan →</button></div>` : ''}`
}

function prefillGenerateKw(keyword, title) {

async function loadGscData() {
  const shopParam = S.currentShop ? `&shop_domain=${encodeURIComponent(S.currentShop)}` : ''
  const dayBtns = document.getElementById('gsc-day-btns')
  if (dayBtns) {
    dayBtns.innerHTML = [7,28,90].map(d =>
      `<button onclick="S.gscDays=${d};loadGscData()"
        class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${S.gscDays===d?'bg-indigo-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}">${d}d</button>`
    ).join('')
  }

  const el = document.getElementById('gsc-body')
  if (!el) return
  el.innerHTML = '<div class="flex justify-center py-10"><div class="spinner-dark"></div></div>'

  try {
    const [overview, pages, queries, opps] = await Promise.all([
      GET(`/api/v1/audit/gsc/overview?days=${S.gscDays}${shopParam}`),
      GET(`/api/v1/audit/gsc/pages?days=${S.gscDays}&limit=20${shopParam}`),
      GET(`/api/v1/audit/gsc/queries?days=${S.gscDays}&limit=20${shopParam}`),
      GET(`/api/v1/audit/gsc/opportunities?days=${S.gscDays}${shopParam}`),
    ])
    renderGscData(overview, pages, queries, opps)
  } catch(e) {
    el.innerHTML = `<div class="text-red-500 text-sm p-4">Error loading GSC data: ${esc(e.message)}</div>`
  }
}

function renderGscData(overview, pages, queries, opps) {
  const el = document.getElementById('gsc-body')
  if (!el) return

  const posBadge = pos => {
    if (!pos) return '—'
    const col = pos<=3?'text-green-600 font-bold':pos<=10?'text-blue-600':pos<=20?'text-yellow-600':'text-gray-500'
    return `<span class="${col}">#${pos.toFixed(1)}</span>`
  }
  const ctrColor = ctr => ctr>=5?'text-green-600':ctr>=2?'text-blue-600':'text-gray-500'

  const stat = (label, value, sub='') => `
    <div class="card text-center">
      <div class="text-2xl font-bold text-gray-800">${value}</div>
      <div class="text-xs text-gray-500 mt-0.5">${label}</div>
      ${sub?`<div class="text-xs text-gray-400 mt-0.5">${sub}</div>`:''}
    </div>`

  const tableRows = (rows, cols) => rows.length
    ? rows.map(r => `<tr class="border-b border-gray-50 table-row">${cols.map(c => `<td class="py-2 px-3 ${c.cls||''}">${c.fn(r)}</td>`).join('')}</tr>`).join('')
    : `<tr><td colspan="${cols.length}" class="py-6 text-center text-gray-400 text-sm">No data</td></tr>`

  el.innerHTML = `
    <div class="space-y-5">

      <!-- Stats -->
      <div class="grid grid-cols-4 gap-3">
        ${stat('Total Clicks', overview.clicks?.toLocaleString() || 0, `Last ${overview.days}d`)}
        ${stat('Impressions', overview.impressions?.toLocaleString() || 0)}
        ${stat('Avg CTR', (overview.ctr||0)+'%')}
        ${stat('Avg Position', overview.position||'—')}
      </div>

      <!-- Opportunities -->
      ${opps.length ? `
      <div class="card">
        <div class="flex items-center justify-between mb-3">
          <div>
            <h3 class="font-semibold text-gray-700">⚡ Quick Win Opportunities</h3>
            <p class="text-xs text-gray-400 mt-0.5">Queries at positions 5–20 with high impressions — push them to page 1</p>
          </div>
          <span class="badge badge-yellow">${opps.filter(o=>o.potential==='quick_win').length} quick wins</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase">
              <th class="text-left py-1.5 px-3">Query</th>
              <th class="text-center py-1.5 px-3">Position</th>
              <th class="text-right py-1.5 px-3">Impressions</th>
              <th class="text-right py-1.5 px-3">Clicks</th>
              <th class="text-right py-1.5 px-3">CTR</th>
              <th class="text-left py-1.5 px-3">Page</th>
              <th class="py-1.5 px-3"></th>
            </tr></thead>
            <tbody>
              ${tableRows(opps, [
                {fn: r => `<span class="font-medium text-gray-800">${esc(r.query)}</span>`},
                {cls:'text-center', fn: r => posBadge(r.position)},
                {cls:'text-right text-gray-600', fn: r => r.impressions.toLocaleString()},
                {cls:'text-right text-gray-600', fn: r => r.clicks.toLocaleString()},
                {cls:'text-right', fn: r => `<span class="${ctrColor(r.ctr)}">${r.ctr}%</span>`},
                {fn: r => `<span class="text-xs text-gray-400 truncate max-w-xs block">${esc(r.page.replace(/https?:\/\/[^/]+/,''))}</span>`},
                {fn: r => `<button class="btn btn-secondary btn-sm" onclick="prefillRankingCheck('${esc(r.query)}')">Check →</button>`},
              ])}
            </tbody>
          </table>
        </div>
      </div>` : ''}

      <!-- Top Pages + Queries side by side -->
      <div class="grid grid-cols-2 gap-4">
        <div class="card">
          <h3 class="font-semibold text-gray-700 mb-3">📄 Top Pages</h3>
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase">
              <th class="text-left py-1.5">Page</th>
              <th class="text-right py-1.5 px-2">Clicks</th>
              <th class="text-right py-1.5 px-2">Pos</th>
            </tr></thead>
            <tbody>
              ${tableRows(pages, [
                {fn: r => {
                  const slug = r.page.replace(/https?:\/\/[^/]+/,'') || '/'
                  return `<span class="text-xs text-gray-600 truncate block max-w-48" title="${esc(r.page)}">${esc(slug)}</span>`
                }},
                {cls:'text-right text-gray-700 font-medium px-2', fn: r => r.clicks.toLocaleString()},
                {cls:'text-right px-2', fn: r => posBadge(r.position)},
              ])}
            </tbody>
          </table>
        </div>

        <div class="card">
          <h3 class="font-semibold text-gray-700 mb-3">🔍 Top Queries</h3>
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase">
              <th class="text-left py-1.5">Query</th>
              <th class="text-right py-1.5 px-2">Clicks</th>
              <th class="text-right py-1.5 px-2">Pos</th>
            </tr></thead>
            <tbody>
              ${tableRows(queries, [
                {fn: r => `<span class="text-gray-700 truncate block max-w-48">${esc(r.query)}</span>`},
                {cls:'text-right text-gray-700 font-medium px-2', fn: r => r.clicks.toLocaleString()},

function switchConnectTab(tab) {
  window._connectTab = tab
  document.getElementById('ct-panel-token').classList.toggle('hidden', tab !== 'token')
  document.getElementById('ct-panel-oauth').classList.toggle('hidden', tab !== 'oauth')
  document.getElementById('ct-tab-token').className = `flex-1 py-1.5 rounded-lg font-medium ${tab==='token' ? 'bg-white shadow text-gray-800' : 'text-gray-500'}`
  document.getElementById('ct-tab-oauth').className = `flex-1 py-1.5 rounded-lg font-medium ${tab==='oauth' ? 'bg-white shadow text-gray-800' : 'text-gray-500'}`
}

async function doConnect() {
  const tab = window._connectTab || 'token'
  if (tab === 'oauth') {
    const shop   = document.getElementById('connect-shop-oauth').value.trim()
    const apiKey = document.getElementById('ct-api-key').value.trim()
    const secret = document.getElementById('ct-api-secret').value.trim()
    const appUrl = document.getElementById('ct-app-url').value.trim()
    if (!shop)   { toast('Enter shop domain', 'error'); return }
    if (!apiKey) { toast('Enter API Key', 'error'); return }
    if (!appUrl) { toast('Enter App URL', 'error'); return }
    const btn = document.getElementById('do-connect-btn')
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving settings…'
    try {
      await PUT('/api/v1/settings/oauth', { api_key: apiKey, api_secret: secret, app_url: appUrl })
    } catch(e) {
      toast('Failed to save OAuth settings: ' + e.message, 'error')
      btn.disabled = false; btn.innerHTML = '🔗 Connect Store'
      return
    }
    S.shopDomain = shop
    try {
      const { install_url } = await POST('/auth/shopify/install-url', { shop })
      window.location.href = install_url
    } catch(e) {
      toast('Failed to start install: ' + e.message, 'error')
      btn.disabled = false; btn.innerHTML = '🔗 Connect Store'
    }
    return
  }
  // Custom App Token
  const shop = document.getElementById('connect-shop-token').value.trim()
  const token = document.getElementById('connect-token').value.trim()
  if (!shop) { toast('Enter shop domain', 'error'); return }
  if (!token) { toast('Enter access token', 'error'); return }
  const btn = document.getElementById('do-connect-btn')
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Connecting…'
  try {
    await POST('/auth/shopify/connect-token', { shop_domain: shop, access_token: token })
    closeModal()
    toast(`✅ ${shop} connected!`, 'success')
    // Refresh store list
    S.myStores = await GET('/api/v1/users/stores/accessible')
    const sel = document.getElementById('store-selector')
    if (sel) sel.innerHTML = S.myStores.map(s => `<option value="${esc(s.shop_domain)}">${esc(s.shop_domain)}</option>`).join('')
    selectShop(shop)
  } catch(e) {
    toast('Connect failed: ' + e.message, 'error')
    btn.disabled = false; btn.innerHTML = '🔗 Connect Store'
  }
}

      </div>

async function doAuth(isRegister) {
  const email = document.getElementById('auth-email')?.value?.trim()
  const pass  = document.getElementById('auth-pass')?.value
  const name  = document.getElementById('auth-name')?.value?.trim()
  if (!email || !pass) { toast('Enter email and password', 'error'); return }
  if (isRegister && !name) { toast('Enter your name', 'error'); return }

  try {
    let resp
    if (isRegister) {
      resp = await fetch('/api/v1/users/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass, name })
      })
    } else {
      resp = await fetch('/api/v1/users/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      })
    }
    const data = await resp.json()
    if (!resp.ok) throw new Error(data.detail || 'Auth failed')
    S.token = data.token
    S.user  = data.user
    localStorage.setItem('seo_token', S.token)
    toast('Welcome, ' + data.user.name + '!', 'success')
    afterLogin()
  } catch(e) {
    toast(e.message, 'error')
    if (!isRegister) {
      const st = await fetch('/api/v1/users/setup-status').then(r=>r.json()).catch(()=>null)
      if (st && !st.bootstrapped) { toast('No accounts found — please register first', 'info'); showLogin(true) }
    }
  }
}

function doLogout() {
  S.token = ''; S.user = null
  localStorage.removeItem('seo_token')
  showLogin()
}

async function afterLogin() {
  // Refresh user profile
  try { S.user = await GET('/api/v1/users/me') } catch { showLogin(); return }

  // Update sidebar user info
  const u = S.user
  document.getElementById('user-avatar').textContent = (u.name||'?')[0].toUpperCase()
  document.getElementById('user-name').textContent   = u.name
  document.getElementById('user-role').textContent   = u.role === 'admin' ? '👑 Admin' : '👤 Member'
  if (u.role === 'admin') document.getElementById('admin-nav').classList.remove('hidden')
  else document.getElementById('admin-nav').classList.add('hidden')
  // Show Knowledge Base nav only for admin or assigned users
  const kbLink = document.getElementById('kb-nav-link')
  if (kbLink) {
    if (u.can_access_kb) kbLink.classList.remove('hidden')
    else kbLink.classList.add('hidden')
  }

  // Load accessible stores
  try {
    S.myStores = await GET('/api/v1/users/stores/accessible')
    const sel = document.getElementById('store-selector')
    if (sel) {
      sel.innerHTML = '<option value="">— select store —</option>' +
        S.myStores.map(s => `<option value="${esc(s.shop_domain)}" ${s.shop_domain===S.currentShop?'selected':''}>${esc(s.shop_domain)}</option>`).join('')
    }
    if (!S.currentShop && S.myStores.length > 0) selectShop(S.myStores[0].shop_domain)
  } catch { S.myStores = [] }

  await loadChannelsForShop()
  nav('dashboard')
}

async function loadChannelsForShop() {
  const sp = S.currentShop ? `?shop_domain=${encodeURIComponent(S.currentShop)}` : ''
  try { S.channels = await GET(`/api/v1/blogs/channels${sp}`) } catch { S.channels = [] }
}

async function selectShop(shop) {
  S.currentShop = shop
  localStorage.setItem('seo_shop', shop)
  const sel = document.getElementById('store-selector')
  if (sel) sel.value = shop
  S.auditResults = null; S.rankingResults = null; S.planResult = null
  S.brandProfile = null; S.allBrands = []; S.selectedBrandDomain = null
  S.posts = null; S.postsPage = 1
  await loadChannelsForShop()
  // Refresh whatever page the user is on so data reflects the new store
  if (typeof nav === 'function' && S.page) nav(S.page)
}
