<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 8px; cursor: pointer;
  color: rgb(165 180 252); font-size: 14px; transition: all .15s;
  text-decoration: none;
}
.nav-link:hover { background: rgba(99,102,241,.2); color: white; }
.nav-link.active { background: rgb(79 70 229); color: white; font-weight: 500; }
.card { background: white; border-radius: 12px; border: 1px solid rgb(229 231 235); padding: 20px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; font-size: 14px;
  font-weight: 500; cursor: pointer; transition: all .15s;
  border: none; white-space: nowrap;
}
.btn:disabled { opacity: .6; cursor: not-allowed; }
.btn-primary { background: rgb(79 70 229); color: white; }
.btn-primary:hover:not(:disabled) { background: rgb(67 56 202); }
.btn-success { background: rgb(22 163 74); color: white; }
.btn-success:hover:not(:disabled) { background: rgb(21 128 61); }
.btn-danger { background: rgb(220 38 38); color: white; }
.btn-secondary { background: white; color: rgb(55 65 81); border: 1px solid rgb(209 213 219); }
.btn-secondary:hover:not(:disabled) { background: rgb(249 250 251); }
.btn-sm { padding: 5px 12px; font-size: 13px; }
.badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 100px; font-size: 12px; font-weight: 500; }
.badge-green { background: rgb(220 252 231); color: rgb(22 101 52); }
.badge-yellow { background: rgb(254 249 195); color: rgb(133 77 14); }
.badge-blue { background: rgb(219 234 254); color: rgb(30 64 175); }
.badge-purple { background: rgb(243 232 255); color: rgb(109 40 217); }
.badge-gray { background: rgb(243 244 246); color: rgb(75 85 99); }
input[type=text], input[type=number], select, textarea {
  width: 100%; padding: 8px 12px; border: 1px solid rgb(209 213 219);
  border-radius: 8px; font-size: 14px; outline: none;
  transition: border-color .15s; background: white; box-sizing: border-box;
}
input:focus, select:focus, textarea:focus {
  border-color: rgb(99 102 241);
  box-shadow: 0 0 0 3px rgba(99,102,241,.1);
}
label { display: block; font-size: 13px; font-weight: 500; color: rgb(55 65 81); margin-bottom: 4px; }
.spinner {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.35);
  border-top-color: white; border-radius: 50%;
  animation: spin .6s linear infinite; display: inline-block; flex-shrink: 0;
}
.spinner-dark {
  width: 32px; height: 32px; border: 3px solid rgb(229 231 235);
  border-top-color: rgb(79 70 229); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.skeleton {
  background: linear-gradient(90deg, #f3f4f6 25%, #e9eaec 50%, #f3f4f6 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.table-row:hover td { background: rgb(249 250 251); }
.action-btns { opacity: 0; transition: opacity .15s; }
.table-row:hover .action-btns { opacity: 1; }
</style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

<!-- ── Sidebar ─────────────────────────────────────────────── -->
<aside class="w-56 bg-indigo-950 flex flex-col shrink-0">
  <div class="px-5 py-5 border-b border-indigo-900">
    <div class="text-white font-bold">🤖 SEO Agent</div>
    <div class="text-indigo-400 text-xs mt-0.5">AI Content Platform</div>
  </div>
  <!-- Store selector -->
  <div class="px-3 py-2 border-b border-indigo-900">
    <div class="text-indigo-400 text-xs mb-1 px-1">Active Store</div>
    <select id="store-selector" onchange="selectShop(this.value)"
      class="w-full text-xs bg-indigo-900 text-white border border-indigo-700 rounded-lg px-2 py-1.5 focus:outline-none focus:border-indigo-400">
      <option value="">— select store —</option>
    </select>
  </div>

  <nav id="sidebar-nav" class="flex-1 px-3 py-4 space-y-0.5">
    <a class="nav-link active" data-page="dashboard" onclick="nav('dashboard')">📊 Dashboard</a>
    <a class="nav-link" data-page="posts"     onclick="nav('posts')">📝 Blog Posts</a>
    <a class="nav-link" data-page="research"  onclick="nav('research')">🔍 Keyword Research</a>
    <a class="nav-link" data-page="topics"    onclick="nav('topics')">🗂 Topic Clusters</a>
    <a class="nav-link" data-page="generate"  onclick="nav('generate')">✍️ Generate Article</a>
    <a class="nav-link" data-page="audit"     onclick="nav('audit')">📈 SEO Audit</a>
    <div id="admin-nav" class="hidden">
      <div class="border-t border-indigo-900 my-2"></div>
      <a class="nav-link" data-page="users" onclick="nav('users')">👥 Users</a>
    </div>
  </nav>

  <!-- User info -->
  <div class="px-3 py-3 border-t border-indigo-900">
    <div id="user-info" class="flex items-center gap-2">
      <div class="w-7 h-7 bg-indigo-700 rounded-full flex items-center justify-center text-xs text-white font-bold" id="user-avatar">?</div>
      <div class="flex-1 min-w-0">
        <div class="text-white text-xs font-medium truncate" id="user-name">—</div>
        <div class="text-indigo-400 text-xs" id="user-role">—</div>
      </div>
      <button onclick="doLogout()" class="text-indigo-400 hover:text-white text-xs" title="Logout">⎋</button>
    </div>
  </div>
</aside>

<!-- ── Main area ───────────────────────────────────────────── -->
<div class="flex-1 flex flex-col overflow-hidden">
  <header class="bg-white border-b border-gray-200 px-6 h-14 flex items-center justify-between shrink-0">
    <h1 id="page-title" class="text-base font-semibold text-gray-800">Dashboard</h1>
    <div id="header-actions" class="flex items-center gap-2"></div>
  </header>
  <main id="content" class="flex-1 overflow-auto p-6"></main>
</div>

<!-- ── Toast ──────────────────────────────────────────────── -->
<div id="toasts" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 items-end pointer-events-none"></div>

<!-- ── Modal ──────────────────────────────────────────────── -->
<div id="modal-bg" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center p-4"
  onclick="if(event.target===this)closeModal()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[88vh] flex flex-col" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 shrink-0">
      <h3 id="modal-title" class="font-semibold text-gray-800 text-sm truncate pr-4"></h3>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-xl leading-none shrink-0">×</button>
    </div>
    <div id="modal-body" class="flex-1 overflow-auto p-5"></div>
    <div id="modal-footer" class="px-5 py-4 border-t border-gray-100 flex gap-2 justify-end shrink-0"></div>
  </div>
</div>

<script>
// ═══════════════════════════ STATE ═══════════════════════════
const S = {
  page: 'dashboard',
  posts: [],
  postsPage: 1,
  postsSource: '',
  postsSearch: '',
  postsStatus: '',
  channels: [],
  research: null,
  generated: null,
  topicPlan: null,
  auditTab: 'blog',
  auditResults: null,
  rankingResults: null,
  // Auth
  token: localStorage.getItem('seo_token') || '',
  user: null,
  // Store context
  currentShop: localStorage.getItem('seo_shop') || '',
  myStores: [],
  gscDays: 28,
  planResult: null,
  rankingKeywords: '',
}
let outlineItems = ['Giới thiệu', 'Nội dung chính', 'Lưu ý quan trọng', 'FAQ']

// ═══════════════════════════ API ═════════════════════════════
const NO_AUTH_PATHS = ['/api/v1/users/login', '/api/v1/users/register', '/api/v1/users/setup-status']
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } }
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token
  if (body !== undefined) opts.body = JSON.stringify(body)
  const r = await fetch(path, opts)
  if (r.status === 401 && !NO_AUTH_PATHS.includes(path)) { showLogin(false); throw new Error('Session expired') }
  const text = await r.text()
  let data
  try { data = JSON.parse(text) } catch { data = { detail: text } }
  if (!r.ok) throw new Error(data?.detail || `HTTP ${r.status}`)
  return data
}
const GET = p => api('GET', p)
const POST = (p, b) => api('POST', p, b ?? {})

// ═══════════════════════════ TOAST ═══════════════════════════
function toast(msg, type = 'info') {
  const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-indigo-600' }
  const el = document.createElement('div')
  el.className = `pointer-events-auto px-4 py-3 rounded-xl text-white text-sm shadow-lg max-w-sm ${colors[type]}`
  el.textContent = msg
  document.getElementById('toasts').appendChild(el)
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300) }, 4000)
}

// ═══════════════════════════ MODAL ═══════════════════════════
function openModal(title, bodyHtml, footerHtml = '') {
  document.getElementById('modal-title').textContent = title
  document.getElementById('modal-body').innerHTML = bodyHtml
  document.getElementById('modal-footer').innerHTML = footerHtml
  document.getElementById('modal-bg').classList.remove('hidden')
}
function closeModal() {
  document.getElementById('modal-bg').classList.add('hidden')
}

// ═══════════════════════════ NAV ═════════════════════════════
function nav(page) {
  S.page = page
  document.querySelectorAll('.nav-link').forEach(el =>
    el.classList.toggle('active', el.dataset.page === page))
  const titles = { dashboard: 'Dashboard', posts: 'Blog Posts', research: 'Keyword Research', topics: 'Topic Clusters', generate: 'Generate Article', audit: 'SEO Audit', users: 'User Management' }
  document.getElementById('page-title').textContent = titles[page] || page
  const pages = { dashboard: renderDashboard, posts: renderPosts, research: renderResearch, topics: renderTopics, generate: renderGenerate, audit: renderAudit, users: renderUsers }
  pages[page]?.()
}

// ─────────────────────────── helpers ─────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}
function statusBadge(s) {
  const m = { published: 'badge-green', draft: 'badge-yellow' }
  return `<span class="badge ${m[s]||'badge-gray'}">${esc(s||'?')}</span>`
}
function sourceBadge(s) {
  const m = { synced: 'badge-blue', generated: 'badge-purple' }
  return `<span class="badge ${m[s]||'badge-gray'}">${esc(s||'?')}</span>`
}
function skeletons(n, h = 'h-8') {
  return Array(n).fill(`<div class="skeleton ${h} mb-2 rounded-lg"></div>`).join('')
}
function loading(el, html) { if (el) el.innerHTML = html }

// ═══════════════════════ DASHBOARD ═══════════════════════════
async function renderDashboard() {
  document.getElementById('header-actions').innerHTML =
    `<button class="btn btn-secondary btn-sm" onclick="openConnectModal()">🔗 Connect Shopify</button>
     <button class="btn btn-primary btn-sm" id="sync-btn" onclick="syncShopify()">🔄 Sync</button>`

  document.getElementById('content').innerHTML = `
    <div id="shopify-status-bar" class="mb-4"></div>
    <div class="grid grid-cols-4 gap-4 mb-5" id="stat-cards">${skeletons(4,'h-24')}</div>
    <div class="card">
      <div class="text-sm font-semibold text-gray-700 mb-3">Recent Posts</div>
      <div id="recent-posts">${skeletons(5)}</div>
    </div>`

  // Load Shopify connection status
  try {
    const stores = await GET('/auth/shopify/status')
    const bar = document.getElementById('shopify-status-bar')
    if (bar) {
      if (stores.length > 0) {
        bar.innerHTML = stores.map(s => `
          <div class="flex items-center gap-2 text-sm text-green-700 bg-green-50 border border-green-200 rounded-xl px-4 py-2 mb-2">
            <span>✅</span>
            <span><strong>${esc(s.shop)}</strong> connected · scopes: ${esc(s.scope||'—')}</span>
          </div>`).join('')
      } else {
        bar.innerHTML = `
          <div class="flex items-center justify-between text-sm bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-2">
            <span class="text-amber-800">⚠️ No Shopify store connected yet</span>
            <button class="btn btn-primary btn-sm" onclick="openConnectModal()">🔗 Connect Now</button>
          </div>`
      }
    }
  } catch(e) {}

  try {
    const [posts, clusters] = await Promise.all([
      GET('/api/v1/blogs/?limit=10&page=1'),
      GET('/api/v1/topics/?limit=100'),
    ])
    const published = posts.filter(p => p.status === 'published').length
    const drafts    = posts.filter(p => p.status === 'draft').length

    document.getElementById('stat-cards').innerHTML = [
      { icon: '📝', label: 'Total Posts',     value: posts.length,     color: 'indigo' },
      { icon: '✅', label: 'Published',        value: published,        color: 'green'  },
      { icon: '📋', label: 'Drafts',           value: drafts,           color: 'yellow' },
      { icon: '🗂', label: 'Topic Clusters',   value: clusters.length,  color: 'purple' },
    ].map(s => `
      <div class="card flex items-center gap-4 cursor-pointer hover:shadow-md transition-shadow" onclick="nav('posts')">
        <div class="text-3xl">${s.icon}</div>
        <div>
          <div class="text-2xl font-bold text-gray-800">${s.value}</div>
          <div class="text-sm text-gray-400">${s.label}</div>
        </div>
      </div>`).join('')

    document.getElementById('recent-posts').innerHTML = posts.length === 0
      ? `<div class="text-sm text-gray-400 py-6 text-center">No posts yet. Sync Shopify or generate an article.</div>`
      : `<table class="w-full text-sm">
          <thead><tr class="text-left text-gray-400 border-b text-xs uppercase">
            <th class="pb-2 font-medium">Title</th>
            <th class="pb-2 font-medium">Keyword</th>
            <th class="pb-2 font-medium">Status</th>
            <th class="pb-2 font-medium">Source</th>
          </tr></thead>
          <tbody>${posts.map(p => `
            <tr class="border-b border-gray-50 table-row cursor-pointer" onclick="nav('posts')">
              <td class="py-2 font-medium text-gray-800 max-w-xs"><div class="truncate">${esc(p.title)}</div></td>
              <td class="py-2 text-gray-500 max-w-[130px]"><div class="truncate">${esc(p.focus_keyword||'—')}</div></td>
              <td class="py-2">${statusBadge(p.status)}</td>
              <td class="py-2">${sourceBadge(p.source)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`
  } catch(e) { toast('Load failed: ' + e.message, 'error') }
}

async function syncShopify() {
  const btn = document.getElementById('sync-btn')
  btn.disabled = true
  btn.innerHTML = `<span class="spinner"></span> Syncing…`
  try {
    const r = await POST('/api/v1/init/shopify')
    toast(`✅ Synced: ${r.articles_synced} new · ${r.articles_updated} updated`, 'success')
    renderDashboard()
  } catch(e) { toast('Sync failed: ' + e.message, 'error') }
  finally { btn.disabled = false; btn.innerHTML = '🔄 Sync Shopify' }
}

// ═══════════════════════ BLOG POSTS ══════════════════════════
async function renderPosts() {
  document.getElementById('header-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="nav('generate')">✍️ New Article</button>`

  document.getElementById('content').innerHTML = `
    <div class="card mb-4">
      <div class="flex gap-3">
        <input type="text" id="ps-search" placeholder="Search title or keyword…" value="${esc(S.postsSearch)}"
          style="flex:1" onkeyup="if(event.key==='Enter'){S.postsSearch=this.value;S.postsPage=1;loadPosts()}">
        <select id="ps-source" style="width:150px" onchange="S.postsSource=this.value;S.postsPage=1;loadPosts()">
          <option value="">All sources</option>
          <option value="synced"    ${S.postsSource==='synced'?'selected':''}>Synced</option>
          <option value="generated" ${S.postsSource==='generated'?'selected':''}>Generated</option>
        </select>
        <select id="ps-status" style="width:140px" onchange="S.postsStatus=this.value;S.postsPage=1;loadPosts()">
          <option value="">All status</option>
          <option value="published" ${S.postsStatus==='published'?'selected':''}>Published</option>
          <option value="draft"     ${S.postsStatus==='draft'?'selected':''}>Draft</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="S.postsSearch=document.getElementById('ps-search').value;S.postsPage=1;loadPosts()">Search</button>
      </div>
    </div>
    <div class="card">
      <div id="posts-table">${skeletons(8)}</div>
      <div id="posts-pager" class="mt-4 flex justify-between items-center text-sm text-gray-500"></div>
    </div>`

  loadPosts()
}

async function loadPosts() {
  const q = new URLSearchParams({
    page: S.postsPage, limit: 20,
    ...(S.postsSource && { source: S.postsSource }),
    ...(S.postsSearch && { keyword: S.postsSearch }),
  })
  try {
    let posts = await GET(`/api/v1/blogs/?${q}`)
    if (S.postsStatus) posts = posts.filter(p => p.status === S.postsStatus)
    S.posts = posts

    const tbl = document.getElementById('posts-table')
    if (!tbl) return

    if (!posts.length) {
      tbl.innerHTML = `<div class="py-12 text-center text-gray-400 text-sm">No posts found.</div>`
      return
    }

    tbl.innerHTML = `
      <table class="w-full text-sm">
        <thead><tr class="text-left text-gray-400 border-b text-xs uppercase">
          <th class="pb-3 font-medium">Title</th>
          <th class="pb-3 font-medium w-36">Keyword</th>
          <th class="pb-3 font-medium w-24">Status</th>
          <th class="pb-3 font-medium w-24">Source</th>
          <th class="pb-3 font-medium w-32">Actions</th>
        </tr></thead>
        <tbody>${posts.map(p => `
          <tr class="border-b border-gray-50 table-row">
            <td class="py-3 pr-3">
              <div class="font-medium text-gray-800 truncate max-w-xs">${esc(p.title)}</div>
              ${p.platform_url
                ? `<a href="${esc(p.platform_url)}" target="_blank" class="text-xs text-indigo-500 hover:underline">View on store ↗</a>`
                : `<span class="text-xs text-gray-300">Not published</span>`}
            </td>
            <td class="py-3 pr-3 text-gray-500 truncate max-w-[144px]">${esc(p.focus_keyword||'—')}</td>
            <td class="py-3 pr-3">${statusBadge(p.status)}</td>
            <td class="py-3 pr-3">${sourceBadge(p.source)}</td>
            <td class="py-3">
              <div class="action-btns flex gap-1">
                <button class="btn btn-secondary btn-sm" onclick="viewPost(${p.id})">View</button>
                ${p.status==='draft'
                  ? `<button class="btn btn-success btn-sm" onclick="openPublishModal(${p.id},'${esc(p.title)}')">Publish</button>`
                  : ''}
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`
  } catch(e) {
    const tbl = document.getElementById('posts-table')
    if (tbl) tbl.innerHTML = `<div class="text-red-500 text-sm py-4 text-center">Error: ${esc(e.message)}</div>`
  }
}

async function viewPost(id) {
  openModal('Loading…', `<div class="flex items-center justify-center py-12"><div class="spinner-dark"></div></div>`)
  try {
    const p = await GET(`/api/v1/generate/article/${id}/content`)
    document.getElementById('modal-title').textContent = p.title
    document.getElementById('modal-body').innerHTML = `
      <div class="flex gap-2 flex-wrap mb-3">${statusBadge(p.status)}</div>
      <div class="text-xs bg-gray-50 rounded-lg p-3 space-y-1 mb-3">
        <div><span class="text-gray-400">SEO Title:</span> ${esc(p.seo_title||'—')}</div>
        <div><span class="text-gray-400">Meta:</span> ${esc(p.seo_description||'—')}</div>
        <div><span class="text-gray-400">Tags:</span> ${(p.tags||[]).join(', ')||'—'}</div>
      </div>
      <div class="border border-gray-200 rounded-xl overflow-hidden">
        <iframe id="preview-frame" class="w-full" style="height:380px" frameborder="0" sandbox="allow-same-origin"></iframe>
      </div>`

    const iframe = document.getElementById('preview-frame')
    if (iframe) iframe.srcdoc =
      `<style>body{font-family:system-ui,sans-serif;padding:20px;font-size:14px;line-height:1.7;max-width:760px;margin:0 auto;color:#1f2937}h1,h2,h3{color:#111827}a{color:#4f46e5}</style>` +
      (p.content_html || '')

    document.getElementById('modal-footer').innerHTML = `
      ${p.status === 'draft'
        ? `<button class="btn btn-success btn-sm" onclick="closeModal();openPublishModal(${id},'${esc(p.title)}')">🚀 Publish to Shopify</button>`
        : ''}
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">Close</button>`
  } catch(e) {
    document.getElementById('modal-body').innerHTML = `<div class="text-red-500 text-sm">Error: ${esc(e.message)}</div>`
  }
}

// ─────────────────── Publish modal ────────────────────────────
function openPublishModal(postId, title) {
  const chOpts = S.channels.map(c =>
    `<option value="${esc(c.platform_id)}">${esc(c.title)} (ID: ${c.platform_id})</option>`).join('')

  openModal(`Publish: ${title}`, `
    <div class="space-y-4">
      <div>
        <label>Shopify Blog ID <span class="text-red-500">*</span></label>
        <input type="number" id="pub-blog-id" placeholder="e.g. 12345678">
        ${chOpts ? `<select class="mt-2" onchange="document.getElementById('pub-blog-id').value=this.value">
          <option value="">— Pick from synced blogs —</option>${chOpts}
        </select>` : `<div class="text-xs text-gray-400 mt-1">Shopify Admin → Online Store → Blog posts → copy numeric ID from URL</div>`}
      </div>
      <div>
        <label>Author</label>
        <input type="text" id="pub-author" value="SEO Agent">
      </div>
      <div class="flex items-center gap-3 py-1">
        <input type="checkbox" id="pub-image" checked class="w-4 h-4 rounded accent-indigo-600">
        <label for="pub-image" class="!mb-0 cursor-pointer">Generate DALL·E 3 banner image</label>
      </div>
      <div class="flex items-center gap-3 py-1">
        <input type="checkbox" id="pub-live" checked class="w-4 h-4 rounded accent-indigo-600">
        <label for="pub-live" class="!mb-0 cursor-pointer">Publish immediately (uncheck = save as Shopify draft)</label>
      </div>
    </div>`,
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary btn-sm" id="do-pub-btn" onclick="doPublish(${postId})">🚀 Publish</button>`)
}

async function doPublish(postId) {
  const blogId = parseInt(document.getElementById('pub-blog-id').value)
  if (!blogId) { toast('Enter a Shopify Blog ID', 'error'); return }

  const genImage  = document.getElementById('pub-image').checked
  const published = document.getElementById('pub-live').checked
  const author    = document.getElementById('pub-author').value

  const btn = document.getElementById('do-pub-btn')
  btn.disabled = true
  btn.innerHTML = `<span class="spinner"></span> ${genImage ? 'Generating image…' : 'Publishing…'}`

  try {
    const endpoint = genImage ? `/api/v1/publish/${postId}/full` : `/api/v1/publish/${postId}/shopify`
    const body = genImage
      ? { blog_id: blogId, author, published, generate_image: true }
      : { blog_id: blogId, author, published }
    const r = await POST(endpoint, body)
    closeModal()
    toast(`✅ Published! ${r.platform_url || ''}`, 'success')
    if (S.page === 'posts') loadPosts()
  } catch(e) {
    toast('Publish failed: ' + e.message, 'error')
    btn.disabled = false
    btn.innerHTML = '🚀 Publish'
  }
}

  if (key === 'pillar') article = S.topicPlan?.pillar

  nav('generate')
  setTimeout(() => {
    const t = document.getElementById('gen-title')
    const k = document.getElementById('gen-kw')
    if (t) t.value = article.title || ''
    if (k) k.value = article.focus_keyword || ''
    if (article.outline?.length) { outlineItems = [...article.outline]; renderOutline() }
  }, 80)

                ${scoreBar(r.score)}

              <td class="text-center py-3 px-2 text-gray-700">${r.word_count.toLocaleString()}</td>
              <td class="text-center py-3 px-2 text-gray-700">${r.h2_count}</td>

            </tr>
            <tr id="audit-expand-${i}" class="hidden bg-gray-50">
              <td colspan="6" class="px-4 py-3">
                <div class="space-y-1">
                  ${r.issues.length ? r.issues.map(issue => `<div class="text-xs text-amber-700 bg-amber-50 rounded px-3 py-1.5">⚠ ${esc(issue)}</div>`).join('') : '<div class="text-xs text-green-700 bg-green-50 rounded px-3 py-1.5">✅ Post looks good!</div>'}

              </td>
            </tr>`).join('')}

async function runRankingCheck() {
  const keywords = (document.getElementById('ranking-keywords').value||'').split('\n').map(k=>k.trim()).filter(Boolean)
  const shop = (document.getElementById('ranking-shop').value||'').trim()
  S.rankingKeywords = document.getElementById('ranking-keywords').value
  S.shopDomain = shop
  if (!keywords.length) { toast('Enter at least one keyword', 'error'); return }
  const btn = document.getElementById('ranking-btn')
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Checking…'
  try {
    const data = await POST('/api/v1/audit/rankings', { keywords, shop_domain: shop })
    S.rankingResults = data
    renderRankingResults(data)
  } catch(e) { toast('Check failed: ' + e.message, 'error') }
  finally { btn.disabled = false; btn.innerHTML = '📍 Check Rankings' }
}

function renderRankingResults(data) {
  const el = document.getElementById('ranking-results')
  if (!el) return
  const results = data.results || []
  if (!results.length) { el.innerHTML = '<p class="text-sm text-gray-400">No results.</p>'; return }

  const posBadge = pos => {
    if (!pos) return '<span class="badge badge-gray">Not ranking</span>'
    if (pos <= 3) return `<span class="badge badge-green">#${pos} 🏆</span>`
    if (pos <= 10) return `<span class="badge badge-blue">#${pos}</span>`
    if (pos <= 20) return `<span class="badge badge-yellow">#${pos}</span>`
    return `<span class="badge badge-gray">#${pos}</span>`
  }

  const ranking = results.filter(r => r.position)
  const notRanking = results.filter(r => !r.position)

  el.innerHTML = `
    <div class="overflow-x-auto mt-2">
      <table class="w-full text-sm">
        <thead><tr class="border-b border-gray-100 text-xs text-gray-500 uppercase">
          <th class="text-left py-2 pr-4">Keyword</th>
          <th class="text-center py-2 px-3">Position</th>
          <th class="text-left py-2 px-3">Ranking URL</th>
        </tr></thead>
        <tbody>
          ${results.map(r => `
            <tr class="border-b border-gray-50 table-row">
              <td class="py-2.5 pr-4 font-medium text-gray-800">${esc(r.keyword)}</td>
              <td class="text-center py-2.5 px-3">${posBadge(r.position)}</td>
              <td class="py-2.5 px-3 text-xs text-gray-500 max-w-xs truncate">
                ${r.ranking_url ? `<a href="${esc(r.ranking_url)}" target="_blank" class="text-indigo-600 hover:underline truncate block">${esc(r.ranking_title||r.ranking_url)}</a>` : '—'}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="mt-3 flex gap-3 text-xs text-gray-400">
      <span>Ranking: <strong class="text-green-600">${ranking.length}</strong></span>
      <span>Not ranking: <strong class="text-gray-500">${notRanking.length}</strong></span>
      ${ranking.length ? `<span>Best: <strong class="text-blue-600">#${Math.min(...ranking.map(r=>r.position))} for "${ranking.sort((a,b)=>a.position-b.position)[0].keyword}"</strong></span>` : ''}
    </div>
    ${S.rankingResults ? `<div class="mt-4"><button class="btn btn-primary btn-sm" onclick="S.auditTab='plan';renderAudit()">🎯 Generate Ranking Plan →</button></div>` : ''}`
}

async function runGeneratePlan() {

  el.innerHTML = `
    <div class="space-y-4 mt-4">
      ${plan.summary ? `<div class="bg-indigo-50 rounded-xl p-4 text-sm text-indigo-800">${esc(plan.summary)}</div>` : ''}

      ${plan.priority_actions?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">⚡ Priority Actions</h3>
          <ol class="space-y-1.5">
            ${plan.priority_actions.map((a,i) => `
              <li class="flex gap-3 text-sm">
                <span class="flex-shrink-0 w-6 h-6 bg-indigo-600 text-white rounded-full flex items-center justify-center text-xs font-bold">${i+1}</span>
                <span class="text-gray-700">${esc(a)}</span>
              </li>`).join('')}
          </ol>
        </div>` : ''}

      ${plan.quick_wins?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">🏆 Quick Wins <span class="text-xs font-normal text-gray-400">(keywords near page 1 — push them over)</span></h3>
          <div class="space-y-2">
            ${plan.quick_wins.map(w => `
              <div class="border border-green-100 bg-green-50 rounded-xl p-3">
                <div class="flex items-center justify-between mb-1">
                  <span class="font-medium text-gray-800">${esc(w.keyword)}</span>
                  <div class="flex gap-2">
                    <span class="badge badge-gray">#${w.current_position||'?'} → #${w.target_position||'?'}</span>
                    <span class="badge ${effortBadge(w.effort)}">${esc(w.effort||'')} effort</span>
                  </div>
                </div>
                ${w.post_title ? `<div class="text-xs text-gray-500 mb-1">Post: ${esc(w.post_title)}</div>` : ''}
                <div class="text-sm text-gray-700">${esc(w.action||'')}</div>
              </div>`).join('')}
          </div>
        </div>` : ''}

      ${plan.content_updates?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">✏️ Content Updates</h3>
          <div class="space-y-2">
            ${plan.content_updates.map(u => `
              <div class="border border-blue-100 bg-blue-50 rounded-xl p-3">
                <div class="font-medium text-gray-800 mb-1">${esc(u.post_title||'Post #'+u.post_id)}</div>
                <ul class="space-y-1">
                  ${(u.recommendations||[]).map(r=>`<li class="text-xs text-gray-600">• ${esc(r)}</li>`).join('')}
                </ul>
                ${u.post_id ? `<button class="btn btn-secondary btn-sm mt-2" onclick="S.page='posts';renderPosts()">Open Post →</button>` : ''}
              </div>`).join('')}
          </div>
        </div>` : ''}

      ${plan.new_articles?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">📝 New Articles to Write</h3>
          <div class="space-y-2">
            ${plan.new_articles.map(a => `
              <div class="border border-purple-100 bg-purple-50 rounded-xl p-3">
                <div class="flex items-center justify-between mb-1">
                  <span class="font-medium text-gray-800">${esc(a.keyword)}</span>
                  <span class="badge ${impactBadge(a.estimated_impact)}">${esc(a.estimated_impact||'')} impact</span>
                </div>
                <div class="text-sm text-indigo-700 mb-1">📌 ${esc(a.suggested_title||'')}</div>
                <div class="text-xs text-gray-600">${esc(a.reason||'')}</div>
                <button class="btn btn-primary btn-sm mt-2" onclick="prefillGenerate(${JSON.stringify(esc(a.keyword))},${JSON.stringify(esc(a.suggested_title))})">✍️ Write This Article</button>
              </div>`).join('')}
          </div>
        </div>` : ''}
    </div>`
}

function renderGscTab() {
  return `
    <div class="card" id="gsc-container">
      <div class="flex items-center justify-between mb-1">
        <div>
          <h2 class="font-semibold text-gray-800">Google Search Console</h2>
          <p class="text-sm text-gray-500 mt-0.5">Real traffic data — clicks, impressions, rankings, opportunities</p>
        </div>
        <div class="flex gap-2" id="gsc-day-btns"></div>
      </div>
      <div id="gsc-body"><div class="flex justify-center py-10"><div class="spinner-dark"></div></div></div>
    </div>`
}

async function initGscTab() {
  const status = await GET('/api/v1/audit/gsc/status').catch(() => ({ configured: false }))
  const el = document.getElementById('gsc-body')
  if (!el) return

  if (!status.configured) {
    el.innerHTML = `
      <div class="bg-amber-50 border border-amber-200 rounded-xl p-6 space-y-4">
        <h3 class="font-semibold text-amber-800">📋 Setup Required</h3>
        <p class="text-sm text-amber-700">Connect Google Search Console to see real traffic data for your store.</p>
        <div class="space-y-3 text-sm">
          <div class="bg-white rounded-lg p-4 border border-amber-100 space-y-2">
            <div class="font-medium text-gray-700">Step 1 — Enable Search Console API</div>
            <div class="text-gray-500">Go to <strong>console.cloud.google.com</strong> → APIs & Services → Enable <strong>Google Search Console API</strong></div>
          </div>
          <div class="bg-white rounded-lg p-4 border border-amber-100 space-y-2">
            <div class="font-medium text-gray-700">Step 2 — Create Service Account</div>
            <div class="text-gray-500">IAM & Admin → Service Accounts → Create → Download <strong>JSON key</strong></div>
          </div>
          <div class="bg-white rounded-lg p-4 border border-amber-100 space-y-2">
            <div class="font-medium text-gray-700">Step 3 — Add to Search Console</div>
            <div class="text-gray-500">search.google.com/search-console → Settings → Users and permissions → Add the service account email as <strong>Restricted</strong></div>
          </div>
          <div class="bg-white rounded-lg p-4 border border-amber-100 space-y-2">
            <div class="font-medium text-gray-700">Step 4 — Set Railway Env Vars</div>
            <div class="font-mono text-xs bg-gray-50 p-2 rounded space-y-1">
              <div>GOOGLE_SERVICE_ACCOUNT_JSON={"type":"service_account",...}</div>
              <div>GSC_SITE_URL=https://gingerglow.myshopify.com/</div>
            </div>
            <div class="text-gray-500 text-xs">Paste the full JSON content of the downloaded key file into GOOGLE_SERVICE_ACCOUNT_JSON</div>
          </div>
        </div>
        ${status.error ? `<div class="text-xs text-red-600 bg-red-50 p-2 rounded">Error: ${esc(status.error)}</div>` : ''}
      </div>`
    return
  }

  S.gscDays = S.gscDays || 28
  await loadGscData()
}

async function loadGscData() {
  const dayBtns = document.getElementById('gsc-day-btns')
  if (dayBtns) {
    dayBtns.innerHTML = [7,28,90].map(d =>
      `<button onclick="S.gscDays=${d};loadGscData()"
        class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${S.gscDays===d?'bg-indigo-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}">${d}d</button>`
    ).join('')
  }

  const el = document.getElementById('gsc-body')
  if (!el) return
  el.innerHTML = '<div class="flex justify-center py-10"><div class="spinner-dark"></div></div>'

  try {
    const [overview, pages, queries, opps] = await Promise.all([
      GET(`/api/v1/audit/gsc/overview?days=${S.gscDays}`),
      GET(`/api/v1/audit/gsc/pages?days=${S.gscDays}&limit=20`),
      GET(`/api/v1/audit/gsc/queries?days=${S.gscDays}&limit=20`),
      GET(`/api/v1/audit/gsc/opportunities?days=${S.gscDays}`),
    ])
    renderGscData(overview, pages, queries, opps)
  } catch(e) {
    el.innerHTML = `<div class="text-red-500 text-sm p-4">Error loading GSC data: ${esc(e.message)}</div>`
  }
}

function renderGscData(overview, pages, queries, opps) {
  const el = document.getElementById('gsc-body')
  if (!el) return

  const posBadge = pos => {
    if (!pos) return '—'
    const col = pos<=3?'text-green-600 font-bold':pos<=10?'text-blue-600':pos<=20?'text-yellow-600':'text-gray-500'
    return `<span class="${col}">#${pos.toFixed(1)}</span>`
  }
  const ctrColor = ctr => ctr>=5?'text-green-600':ctr>=2?'text-blue-600':'text-gray-500'

  const stat = (label, value, sub='') => `
    <div class="card text-center">
      <div class="text-2xl font-bold text-gray-800">${value}</div>
      <div class="text-xs text-gray-500 mt-0.5">${label}</div>
      ${sub?`<div class="text-xs text-gray-400 mt-0.5">${sub}</div>`:''}
    </div>`

  const tableRows = (rows, cols) => rows.length
    ? rows.map(r => `<tr class="border-b border-gray-50 table-row">${cols.map(c => `<td class="py-2 px-3 ${c.cls||''}">${c.fn(r)}</td>`).join('')}</tr>`).join('')
    : `<tr><td colspan="${cols.length}" class="py-6 text-center text-gray-400 text-sm">No data</td></tr>`

  el.innerHTML = `
    <div class="space-y-5">

      <!-- Stats -->
      <div class="grid grid-cols-4 gap-3">
        ${stat('Total Clicks', overview.clicks?.toLocaleString() || 0, `Last ${overview.days}d`)}
        ${stat('Impressions', overview.impressions?.toLocaleString() || 0)}
        ${stat('Avg CTR', (overview.ctr||0)+'%')}
        ${stat('Avg Position', overview.position||'—')}
      </div>

      <!-- Opportunities -->
      ${opps.length ? `
      <div class="card">
        <div class="flex items-center justify-between mb-3">
          <div>
            <h3 class="font-semibold text-gray-700">⚡ Quick Win Opportunities</h3>
            <p class="text-xs text-gray-400 mt-0.5">Queries at positions 5–20 with high impressions — push them to page 1</p>
          </div>
          <span class="badge badge-yellow">${opps.filter(o=>o.potential==='quick_win').length} quick wins</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase">
              <th class="text-left py-1.5 px-3">Query</th>
              <th class="text-center py-1.5 px-3">Position</th>
              <th class="text-right py-1.5 px-3">Impressions</th>
              <th class="text-right py-1.5 px-3">Clicks</th>
              <th class="text-right py-1.5 px-3">CTR</th>
              <th class="text-left py-1.5 px-3">Page</th>
              <th class="py-1.5 px-3"></th>
            </tr></thead>
            <tbody>
              ${tableRows(opps, [
                {fn: r => `<span class="font-medium text-gray-800">${esc(r.query)}</span>`},
                {cls:'text-center', fn: r => posBadge(r.position)},
                {cls:'text-right text-gray-600', fn: r => r.impressions.toLocaleString()},
                {cls:'text-right text-gray-600', fn: r => r.clicks.toLocaleString()},
                {cls:'text-right', fn: r => `<span class="${ctrColor(r.ctr)}">${r.ctr}%</span>`},
                {fn: r => `<span class="text-xs text-gray-400 truncate max-w-xs block">${esc(r.page.replace(/https?:\/\/[^/]+/,''))}</span>`},
                {fn: r => `<button class="btn btn-secondary btn-sm" onclick="prefillRankingCheck('${esc(r.query)}')">Check →</button>`},
              ])}
            </tbody>
          </table>
        </div>
      </div>` : ''}

      <!-- Top Pages + Queries side by side -->
      <div class="grid grid-cols-2 gap-4">
        <div class="card">
          <h3 class="font-semibold text-gray-700 mb-3">📄 Top Pages</h3>
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase">
              <th class="text-left py-1.5">Page</th>
              <th class="text-right py-1.5 px-2">Clicks</th>
              <th class="text-right py-1.5 px-2">Pos</th>
            </tr></thead>
            <tbody>
              ${tableRows(pages, [
                {fn: r => {
                  const slug = r.page.replace(/https?:\/\/[^/]+/,'') || '/'
                  return `<span class="text-xs text-gray-600 truncate block max-w-48" title="${esc(r.page)}">${esc(slug)}</span>`
                }},
                {cls:'text-right text-gray-700 font-medium px-2', fn: r => r.clicks.toLocaleString()},
                {cls:'text-right px-2', fn: r => posBadge(r.position)},
              ])}
            </tbody>
          </table>
        </div>

        <div class="card">
          <h3 class="font-semibold text-gray-700 mb-3">🔍 Top Queries</h3>
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase">
              <th class="text-left py-1.5">Query</th>
              <th class="text-right py-1.5 px-2">Clicks</th>
              <th class="text-right py-1.5 px-2">Pos</th>
            </tr></thead>
            <tbody>
              ${tableRows(queries, [
                {fn: r => `<span class="text-gray-700 truncate block max-w-48">${esc(r.query)}</span>`},
                {cls:'text-right text-gray-700 font-medium px-2', fn: r => r.clicks.toLocaleString()},
                {cls:'text-right px-2', fn: r => posBadge(r.position)},
              ])}
            </tbody>
          </table>
        </div>
      </div>

      <div class="text-xs text-gray-400 text-right">Data from Google Search Console · ${esc(overview.start_date||'')} → ${esc(overview.end_date||'')} · ~2 day lag</div>
    </div>`
}

  openModal('Connect Shopify Store', `
    <div class="space-y-4">
      <p class="text-sm text-gray-600">Enter your Shopify store domain to start the OAuth authorization flow.</p>
      <div>
        <label>Shop Domain</label>
        <input type="text" id="connect-shop" placeholder="yourstore.myshopify.com" value="${esc(S.shopDomain||'')}">
      </div>
      <div class="text-xs text-gray-400 bg-gray-50 rounded-lg p-3 space-y-1">
        <div>📋 <strong>Before connecting, make sure in Partner Dashboard:</strong></div>
        <div>• App setup → App URL = <code>${window.location.origin}/auth/shopify</code></div>
        <div>• Allowed redirection URLs = <code>${window.location.origin}/auth/shopify/callback</code></div>
      </div>
    </div>`,
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary btn-sm" onclick="doConnect()">🔗 Authorize →</button>`)
}

function doConnect() {
  const shop = document.getElementById('connect-shop').value.trim()
  if (!shop) { toast('Enter shop domain', 'error'); return }
  S.shopDomain = shop
  window.location.href = `/auth/shopify?shop=${encodeURIComponent(shop)}`
}

// ══════════════════════════ AUTH ═════════════════════════════
function showLogin(isRegister = false) {
  // Check if any users exist (bootstrap mode)
  fetch('/api/v1/users/me', { headers: S.token ? { Authorization: 'Bearer ' + S.token } : {} })
    .then(r => r.status === 404 ? 'bootstrap' : 'login')
    .catch(() => 'login')

  const tab = isRegister ? 'register' : 'login'
  document.getElementById('content').innerHTML = `
    <div class="flex items-center justify-center min-h-full">
      <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
        <div class="text-center mb-6">
          <div class="text-4xl mb-2">🤖</div>
          <h2 class="text-xl font-bold text-gray-800">SEO Agent</h2>
          <p class="text-gray-500 text-sm mt-1">Sign in to continue</p>
        </div>
        <div class="flex gap-2 mb-5 bg-gray-100 p-1 rounded-xl">
          <button onclick="showLogin(false)" class="flex-1 py-1.5 text-sm font-medium rounded-lg transition-colors ${!isRegister?'bg-white shadow text-gray-800':'text-gray-500'}">Login</button>
          <button onclick="showLogin(true)"  class="flex-1 py-1.5 text-sm font-medium rounded-lg transition-colors ${isRegister?'bg-white shadow text-gray-800':'text-gray-500'}">Register</button>
        </div>
        <div class="space-y-3">
          ${isRegister ? `<div><label>Name</label><input type="text" id="auth-name" placeholder="Your name" autofocus></div>` : ''}
          <div><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" ${!isRegister?'autofocus':''}></div>
          <div><label>Password</label><input type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth(${isRegister})"></div>
          <button class="btn btn-primary w-full mt-2" style="width:100%;justify-content:center" onclick="doAuth(${isRegister})">
            ${isRegister ? '✨ Create Account' : '→ Sign In'}
          </button>
          ${isRegister ? '<p class="text-xs text-gray-400 text-center">First account becomes admin</p>' : ''}
        </div>
      </div>
    </div>`
  document.getElementById('header-actions').innerHTML = ''
  document.getElementById('page-title').textContent = isRegister ? 'Create Account' : 'Sign In'
}

async function doAuth(isRegister) {
  const email = document.getElementById('auth-email')?.value?.trim()
  const pass  = document.getElementById('auth-pass')?.value
  const name  = document.getElementById('auth-name')?.value?.trim()
  if (!email || !pass) { toast('Enter email and password', 'error'); return }
  if (isRegister && !name) { toast('Enter your name', 'error'); return }

  try {
    let resp
    if (isRegister) {
      resp = await fetch('/api/v1/users/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass, name })
      })
    } else {
      resp = await fetch('/api/v1/users/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      })
    }
    const data = await resp.json()
    if (!resp.ok) throw new Error(data.detail || 'Auth failed')
    S.token = data.token
    S.user  = data.user
    localStorage.setItem('seo_token', S.token)
    toast('Welcome, ' + data.user.name + '!', 'success')
    afterLogin()
  } catch(e) { toast(e.message, 'error') }
}

function doLogout() {
  S.token = ''; S.user = null
  localStorage.removeItem('seo_token')
  showLogin()
}

async function afterLogin() {
  // Refresh user profile
  try { S.user = await GET('/api/v1/users/me') } catch { showLogin(); return }

  // Update sidebar user info
  const u = S.user
  document.getElementById('user-avatar').textContent = (u.name||'?')[0].toUpperCase()
  document.getElementById('user-name').textContent   = u.name
  document.getElementById('user-role').textContent   = u.role === 'admin' ? '👑 Admin' : '👤 Member'
  if (u.role === 'admin') document.getElementById('admin-nav').classList.remove('hidden')
  else document.getElementById('admin-nav').classList.add('hidden')

  // Load accessible stores
  try {
    S.myStores = await GET('/api/v1/users/stores/accessible')
    const sel = document.getElementById('store-selector')
    if (sel) {
      sel.innerHTML = '<option value="">— select store —</option>' +
        S.myStores.map(s => `<option value="${esc(s.shop_domain)}" ${s.shop_domain===S.currentShop?'selected':''}>${esc(s.shop_domain)}</option>`).join('')
    }
    if (!S.currentShop && S.myStores.length > 0) selectShop(S.myStores[0].shop_domain)
  } catch { S.myStores = [] }

  try { S.channels = await GET('/api/v1/blogs/channels') } catch { S.channels = [] }
  nav('dashboard')
}

function selectShop(shop) {
  S.currentShop = shop
  localStorage.setItem('seo_shop', shop)
  const sel = document.getElementById('store-selector')
  if (sel) sel.value = shop
  // Reset audit results when store changes
  S.auditResults = null; S.rankingResults = null; S.planResult = null
  if (S.page === 'audit') renderAudit()
}

// ══════════════════════ USER MANAGEMENT ══════════════════════
async function renderUsers() {
  if (!S.user || S.user.role !== 'admin') {
    document.getElementById('content').innerHTML = '<div class="card text-center text-gray-400 py-10">Admin access required</div>'
    return
  }
  document.getElementById('header-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="openCreateUserModal()">+ New User</button>`

  document.getElementById('content').innerHTML = `
    <div class="space-y-4">
      <div class="card" id="users-table"><div class="flex justify-center py-8"><div class="spinner-dark"></div></div></div>
    </div>`

  loadUsersTable()
}

async function loadUsersTable() {
  try {
    const users = await GET('/api/v1/users/')
    const el = document.getElementById('users-table')
    if (!el) return

    const scopeBadge = s => {
      const colors = { read:'badge-blue', write:'badge-yellow', publish:'badge-green', audit:'badge-purple' }
      return `<span class="badge ${colors[s]||'badge-gray'} mr-1">${s}</span>`
    }

    el.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-gray-800">Users (${users.length})</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase">
            <th class="text-left py-2 pr-4">User</th>
            <th class="text-center py-2 px-3">Role</th>
            <th class="text-left py-2 px-3">Store Access</th>
            <th class="text-center py-2 px-3">Status</th>
            <th class="py-2 px-3"></th>
          </tr></thead>
          <tbody>
            ${users.map(u => `
              <tr class="border-b border-gray-50 table-row" id="user-row-${u.id}">
                <td class="py-3 pr-4">
                  <div class="font-medium text-gray-800">${esc(u.name)}</div>
                  <div class="text-xs text-gray-400">${esc(u.email)}</div>
                </td>
                <td class="text-center py-3 px-3">
                  <span class="badge ${u.role==='admin'?'badge-purple':'badge-blue'}">${u.role==='admin'?'👑 Admin':'👤 Member'}</span>
                </td>
                <td class="py-3 px-3">
                  ${u.store_permissions && u.store_permissions.length
                    ? u.store_permissions.map(p => `
                        <div class="mb-1">
                          <span class="text-xs font-medium text-gray-600">${esc(p.shop_domain)}</span>
                          <span class="ml-1">${(p.scopes||[]).map(scopeBadge).join('')}</span>
                        </div>`).join('')
                    : '<span class="text-xs text-gray-400">' + (u.role==='admin' ? 'All stores' : 'No stores assigned') + '</span>'
                  }
                </td>
                <td class="text-center py-3 px-3">
                  <span class="badge ${u.is_active?'badge-green':'badge-gray'}">${u.is_active?'Active':'Disabled'}</span>
                </td>
                <td class="py-3 px-3">
                  <div class="flex gap-1 action-btns">
                    <button class="btn btn-secondary btn-sm" onclick="openPermModal(${u.id},'${esc(u.name)}',${JSON.stringify(u.store_permissions||[])})">🔑 Permissions</button>
                    <button class="btn btn-secondary btn-sm" onclick="toggleUserActive(${u.id},${!u.is_active})">${u.is_active?'Disable':'Enable'}</button>
                    ${u.id !== S.user?.id ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id},'${esc(u.name)}')">×</button>` : ''}
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`
  } catch(e) { toast('Failed to load users: ' + e.message, 'error') }
}

function openCreateUserModal() {
  const stores = S.myStores.map(s => s.shop_domain)
  openModal('Create New User', `
    <div class="space-y-3">
      <div><label>Name</label><input type="text" id="nu-name" placeholder="Full name"></div>
      <div><label>Email</label><input type="email" id="nu-email" placeholder="user@example.com"></div>
      <div><label>Password</label><input type="password" id="nu-pass" placeholder="Min 6 characters"></div>
      <div><label>Role</label>
        <select id="nu-role">
          <option value="member">👤 Member</option>
          <option value="admin">👑 Admin</option>
        </select>
      </div>
    </div>`,
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary btn-sm" onclick="doCreateUser()">Create User</button>`)
}

async function doCreateUser() {
  const name  = document.getElementById('nu-name')?.value?.trim()
  const email = document.getElementById('nu-email')?.value?.trim()
  const pass  = document.getElementById('nu-pass')?.value
  const role  = document.getElementById('nu-role')?.value
  if (!name || !email || !pass) { toast('Fill all fields', 'error'); return }
  try {
    await POST('/api/v1/users/', { name, email, password: pass, role })
    toast('User created', 'success')
    closeModal()
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

function openPermModal(userId, userName, currentPerms) {
  const stores = S.myStores.map(s => s.shop_domain)
  const scopeOpts = ['read', 'write', 'publish', 'audit']
  const existingByShop = {}
  currentPerms.forEach(p => { existingByShop[p.shop_domain] = p.scopes || [] })

  openModal(`Permissions — ${userName}`, `
    <div class="space-y-4">
      <p class="text-sm text-gray-500">Assign which stores and capabilities this user can access.</p>
      <div>
        <label>Store</label>
        <select id="perm-shop" class="mb-3" onchange="updatePermScopes(this.value,${JSON.stringify(existingByShop).replace(/"/g,'&quot;')})">
          ${stores.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('')}
          ${!stores.length ? '<option value="">No stores connected yet</option>' : ''}
        </select>
        <label>Capabilities</label>
        <div id="perm-scopes" class="flex flex-wrap gap-2 mt-1">
          ${scopeOpts.map(sc => `
            <label class="flex items-center gap-1.5 cursor-pointer text-sm">
              <input type="checkbox" value="${sc}" class="perm-cb rounded" ${(existingByShop[stores[0]]||[]).includes(sc)?'checked':''}>
              ${sc}
            </label>`).join('')}
        </div>
        <div class="text-xs text-gray-400 mt-2 space-y-0.5">
          <div><strong>read</strong> — view posts, audit results</div>
          <div><strong>audit</strong> — run audits, keyword research</div>
          <div><strong>write</strong> — generate articles</div>
          <div><strong>publish</strong> — publish to Shopify</div>
        </div>
      </div>
      <div id="current-perms">
        <div class="text-xs font-medium text-gray-500 mb-1">Current permissions:</div>
        ${currentPerms.length
          ? currentPerms.map(p => `
              <div class="flex items-center justify-between text-xs bg-gray-50 rounded-lg px-3 py-1.5 mb-1">
                <span>${esc(p.shop_domain)} — ${(p.scopes||[]).join(', ')}</span>
                <button onclick="revokePermInModal(${userId},'${esc(p.shop_domain)}')" class="text-red-400 hover:text-red-600 ml-2">×</button>
              </div>`).join('')
          : '<div class="text-xs text-gray-400">None yet</div>'
        }
      </div>
    </div>`,
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Close</button>
     <button class="btn btn-primary btn-sm" onclick="doGrantPerm(${userId})">Grant Access</button>`)
}

function updatePermScopes(shop, existingByShop) {
  const scopes = existingByShop[shop] || []
  document.querySelectorAll('.perm-cb').forEach(cb => {
    cb.checked = scopes.includes(cb.value)
  })
}

async function doGrantPerm(userId) {
  const shop = document.getElementById('perm-shop')?.value
  const scopes = [...document.querySelectorAll('.perm-cb:checked')].map(cb => cb.value)
  if (!shop) { toast('Select a store', 'error'); return }
  if (!scopes.length) { toast('Select at least one scope', 'error'); return }
  try {
    await POST(`/api/v1/users/${userId}/permissions`, { shop_domain: shop, scopes })
    toast('Permission granted', 'success')
    closeModal()
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

async function revokePermInModal(userId, shop) {
  if (!confirm(`Revoke access to ${shop}?`)) return
  try {
    await api('DELETE', `/api/v1/users/${userId}/permissions/${encodeURIComponent(shop)}`)
    toast('Access revoked', 'success')
    closeModal()
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

async function toggleUserActive(userId, active) {
  try {
    await api('PUT', `/api/v1/users/${userId}`, { is_active: active })
    toast(active ? 'User enabled' : 'User disabled', 'success')
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

async function deleteUser(userId, name) {
  if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return
  try {
    await api('DELETE', `/api/v1/users/${userId}`)
    toast('User deleted', 'success')
    loadUsersTable()
  } catch(e) { toast(e.message, 'error') }
}

// ══════════════════════ KEYWORD SUGGESTIONS ════════════════════
async function loadStoreSuggestions() {
  if (!S.currentShop) { toast('Select a store first', 'error'); return }
  const btn = document.getElementById('suggest-btn')
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Analysing…' }
  try {
    const data = await GET(`/api/v1/users/stores/${encodeURIComponent(S.currentShop)}/suggestions`)
    renderSuggestions(data)
  } catch(e) { toast('Suggestions failed: ' + e.message, 'error') }
  finally { if (btn) { btn.disabled = false; btn.innerHTML = '✨ Get Suggestions' } }
}

function renderSuggestions(data) {
  const el = document.getElementById('suggestions-results')
  if (!el) return

  const diffBadge = d => d==='low'?'badge-green':d==='medium'?'badge-yellow':'badge-red'
  const intentBadge = i => i==='commercial'?'badge-purple':i==='informational'?'badge-blue':'badge-gray'

  el.innerHTML = `
    <div class="space-y-4 mt-4">
      ${data.store_niche ? `<div class="bg-indigo-50 rounded-xl p-3 text-sm text-indigo-800"><strong>Store niche:</strong> ${esc(data.store_niche)}</div>` : ''}

      ${data.priority_keywords?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">🎯 Priority Keywords</h3>
          <div class="grid grid-cols-2 gap-2">
            ${data.priority_keywords.map(k => `
              <div class="border border-gray-100 rounded-xl p-3 bg-white">
                <div class="flex items-center justify-between mb-1">
                  <span class="font-medium text-gray-800 text-sm">${esc(k.keyword)}</span>
                  <span class="badge ${diffBadge(k.difficulty)}">${k.difficulty}</span>
                </div>
                <div class="flex gap-1 mb-1">
                  <span class="badge ${intentBadge(k.intent)} text-xs">${k.intent}</span>
                </div>
                <div class="text-xs text-gray-500">${esc(k.reason)}</div>
                <div class="flex gap-1 mt-2">
                  <button class="btn btn-secondary btn-sm" onclick="prefillRankingCheck('${esc(k.keyword)}')">Check rank</button>
                  <button class="btn btn-primary btn-sm" onclick="prefillGenerate('${esc(k.keyword)}','')">Write</button>
                </div>
              </div>`).join('')}
          </div>
        </div>` : ''}

      ${data.long_tail?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">🔗 Long-Tail Keywords</h3>
          <div class="flex flex-wrap gap-2">
            ${data.long_tail.map(k => `
              <div class="bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm">
                <div class="font-medium text-gray-700">${esc(k.keyword)}</div>
                <div class="flex gap-1 mt-1">
                  <span class="badge ${diffBadge(k.difficulty)}">${k.difficulty}</span>
                  <button class="btn btn-secondary btn-sm" onclick="prefillRankingCheck('${esc(k.keyword)}')">→</button>
                </div>
              </div>`).join('')}
          </div>
        </div>` : ''}

      ${data.trending_topics?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">🔥 Trending Topics</h3>
          <div class="space-y-2">
            ${data.trending_topics.map(t => `
              <div class="border border-orange-100 bg-orange-50 rounded-xl p-3">
                <div class="font-medium text-gray-800 text-sm mb-0.5">${esc(t.topic)}</div>
                <div class="text-xs text-indigo-700 mb-1">📌 ${esc(t.suggested_title)}</div>
                <div class="text-xs text-gray-500 mb-2">${esc(t.reason)}</div>
                <button class="btn btn-primary btn-sm" onclick="prefillGenerate('${esc(t.topic)}','${esc(t.suggested_title)}')">✍️ Write this</button>
              </div>`).join('')}
          </div>
        </div>` : ''}

      ${data.content_gaps?.length ? `
        <div>
          <h3 class="font-semibold text-gray-700 mb-2">⚡ Content Gaps</h3>
          <div class="space-y-1">
            ${data.content_gaps.map(g => `
              <div class="flex items-center justify-between bg-red-50 border border-red-100 rounded-xl px-3 py-2">
                <div>
                  <span class="font-medium text-sm text-gray-800">${esc(g.keyword)}</span>
                  <span class="text-xs text-gray-500 ml-2">${esc(g.reason)}</span>
                </div>
                <button class="btn btn-primary btn-sm" onclick="prefillGenerate('${esc(g.keyword)}','')">Fill gap →</button>
              </div>`).join('')}
          </div>
        </div>` : ''}
    </div>`
}

// ═══════════════════════════ INIT ════════════════════════════
async function init() {
  // Check if already logged in
  if (S.token) {
    try {
      S.user = await fetch('/api/v1/users/me', { headers: { Authorization: 'Bearer ' + S.token } })
        .then(r => r.ok ? r.json() : null)
      if (S.user) { afterLogin(); return }
    } catch {}
  }
  // No valid session — check if any users exist
  try {
    const status = await fetch('/api/v1/users/setup-status').then(r => r.json())
    showLogin(!status.bootstrapped)  // no users → show register; has users → show login
  } catch { showLogin(false) }
}
init()
</script>
